<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revaluation Result | Diploma Engineers</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body{
    margin:0;
    font-family:'Segoe UI';
    background:linear-gradient(135deg,#0f172a,#020617);
    color:white;
}

/* NAVBAR */
.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 25px;
    background:#020617;
    border-bottom:1px solid #1e293b;
}

.logo{
    font-size:20px;
    font-weight:bold;
    color:#22c55e;
}

/* MAIN */
.container{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:90vh;
}

/* CARD */
.card{
    width:420px;
    background:#0f172a;
    border:1px solid #1e293b;
    border-radius:20px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

/* HEADER */
.card h2{
    text-align:center;
    margin-bottom:5px;
}

.card p{
    text-align:center;
    color:#94a3b8;
    font-size:14px;
    margin-bottom:20px;
}

/* INPUT */
.input-box{
    margin-bottom:15px;
}

.input-box label{
    font-size:14px;
    color:#cbd5f5;
}

.input-box input{
    width:100%;
    padding:12px;
    margin-top:5px;
    border-radius:10px;
    border:1px solid #334155;
    background:#020617;
    color:white;
}

/* BUTTON */
.btn{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#22c55e;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    background:#16a34a;
}

/* SUCCESS */
.success{
    display:none;
    margin-top:15px;
    background:#022c22;
    padding:10px;
    border-radius:10px;
    text-align:center;
    color:#22c55e;
}

.success.active{
    display:block;
}

/* RESULT BUTTON */
.view-btn{
    display:none;
    margin-top:10px;
    background:#0ea5e9;
}

.view-btn.active{
    display:block;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">🎓 Diploma Engineers</div>
</div>

<!-- MAIN -->
<div class="container">
    <div class="card">

        <h2>Revaluation Result</h2>
        <p>Check your BTE Odd Semester Re-check Result</p>

        <div class="input-box">
            <label>Enrollment Number</label>
            <input type="text" placeholder="E25111033800024">
        </div>

        <div class="input-box">
            <label>Date of Birth</label>
            <input type="text" placeholder="DD/MM/YYYY">
        </div>

        <button class="btn">Generate Result Link</button>

        <div class="success">✅ Link Generated Successfully</div>

        <button class="btn view-btn">View Result</button>

    </div>
</div>

</body>
</html>
