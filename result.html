<style>

html{scroll-behavior:smooth;}

body{
    margin:0;
    font-family:'Poppins', sans-serif;
    padding-top:80px;
    background:#f4f7fb;
}

/* NAVBAR */
.navbar{
    background: rgba(29,53,87,0.9);
    backdrop-filter: blur(10px);
}
.navbar a{color:white !important;}
.nav-link{margin-left:15px; position:relative;}
.nav-link::after{
    content:"";
    width:0%;
    height:2px;
    background:#ff7b00;
    position:absolute;
    left:0; bottom:0;
    transition:0.3s;
}
.nav-link:hover::after{width:100%;}

.back-btn{
    color:#22c55e;
    border:1px solid #22c55e;
    padding:5px 15px;
    border-radius:20px;
    text-decoration:none;
    transition:0.3s;
}
.back-btn:hover{
    background:#22c55e;
    color:#000;
}


/* SECTION */
.section{padding:60px 20px;}
.title{text-align:center; font-weight:700; margin-bottom:40px;}
.title span{color:#ff7b00;}

/* CARD */
.card{
    background:#fff;
    padding:30px;
    border-radius:20px;
    max-width:400px;
    margin:60px auto;
    border:1px solid #222;
    text-align:center;
    box-shadow:0 0 20px rgba(34,197,94,0.1);
}

/* BUTTON */
.option{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

/* MAIN BUTTON */
.main-btn{
    background:#22c55e;
    color:black;
}
.main-btn:hover{
    background:#16a34a;
}

/* REVAL BUTTON */
.reval-btn{
    background:#0ea5e9;
    color:white;
}
.reval-btn:hover{

<body>
