<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Result - Diploma Engineers</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#000;
    color:white;
    font-family:'Poppins',sans-serif;
}

/* NAVBAR */
.navbar{
    background:#0a0a0a;
    border-bottom:1px solid #222;
}

/* BACK BUTTON */
.back-btn{
    color:#22c55e;
    border:1px solid #22c55e;
    padding:5px 15px;
    border-radius:20px;
    text-decoration:none;
}
.back-btn:hover{
    background:#22c55e;
    color:#000;
}

/* CARD */
.card{
    background:#111;
    padding:30px;
    border-radius:20px;
    max-width:400px;
    margin:60px auto;
    border:1px solid #222;
    text-align:center;
    box-shadow:0 0 20px rgba(34,197,94,0.1);
}

/* BUTTON */
.option{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

/* MAIN BUTTON */
.main-btn{
    background:#22c55e;
    color:black;
}
.main-btn:hover{
    background:#16a34a;
}

/* REVAL BUTTON */
.reval-btn{
    background:#0ea5e9;
    color:white;
}
.reval-btn:hover{
    background:#0284c7;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar p-3">
<div class="container d-flex justify-content-between">

<a href="index.html" class="back-btn">⬅ Back</a>
<span class="text-success fw-bold">Diploma Engineers</span>

</div>
</nav>

<!-- MAIN -->
<div class="container">
    <div class="card">

        <h2>Select Result Type</h2>
        <p style="color:#aaa;">Choose which result you want to check</p>

        <button class="option main-btn" onclick="goMain()">
            📄 Main Result
        </button>

        <button class="option reval-btn" onclick="goReval()">
            🔁 Revaluation Result
        </button>

    </div>
</div>

<script>
function goMain(){
    window.location.href = "main-result.html";
}

function goReval(){
    window.location.href = "reval-result.html";
}
</script>

</body>
</html>

 <!-- FOOTER -->
<div id="footer"></div>

<script>
fetch("footer.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("footer").innerHTML = data;
  });
</script>
