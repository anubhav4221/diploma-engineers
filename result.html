<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BTEUP Revaluation Result</title>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card */
.result-card {
    background: #fff;
    width: 400px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    overflow: hidden;
}

/* Header */
.card-header {
    background: #007bff;
    color: white;
    text-align: center;
    padding: 20px;
}

.card-header h1 {
    margin: 0;
    font-size: 22px;
}

.developer-badge {
    font-size: 13px;
    margin-top: 8px;
}

/* Body */
.card-body {
    padding: 20px;
}

.input-field {
    margin-bottom: 15px;
}

.input-field label {
    display: block;
    margin-bottom: 5px;
    font-weight: bold;
}

.input-field input {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

.helper-tip {
    font-size: 12px;
    color: #777;
}

.error-msg {
    color: red;
    font-size: 12px;
    display: none;
}

/* Buttons */
.btn-generate {
    width: 100%;
    padding: 12px;
    border: none;
    background: #28a745;
    color: white;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 10px;
}

.btn-result {
    width: 100%;
    padding: 12px;
    border: none;
    background: #007bff;
    color: white;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 10px;
    display: none;
}

/* Success */
.success-area {
    color: green;
    text-align: center;
    margin-top: 10px;
    display: none;
}
</style>
</head>

<body>

<div class="result-card">
    <div class="card-header">
        <h1><i class="fas fa-link"></i> BTE Revaluation Result</h1>
        <p>Fast & secure access to your result</p>
        <div class="developer-badge">
            Developed by <strong>Amit Kumar</strong>
        </div>
    </div>

    <div class="card-body">

        <div class="input-field">
            <label>Enrollment Number</label>
            <input type="text" id="enrollNo" placeholder="Enter Enrollment">
            <div class="error-msg" id="enrollError">Enter Enrollment Number</div>
        </div>

        <div class="input-field">
            <label>Date of Birth</label>
            <input type="text" id="dobInput" placeholder="DD/MM/YYYY">
            <div class="error-msg" id="dobError">Enter valid DOB</div>
        </div>

        <button class="btn-generate" onclick="generateLink()">Generate Result Link</button>

        <div class="success-area" id="successMsg">
            ✅ Link Generated Successfully
        </div>

        <button class="btn-result" id="viewResultBtn" onclick="openResult()">
            Open Result
        </button>

    </div>
</div>

<script>
let finalURL = "";

function generateLink() {
    let enroll = document.getElementById("enrollNo").value.trim();
    let dob = document.getElementById("dobInput").value.trim();

    let enrollError = document.getElementById("enrollError");
    let dobError = document.getElementById("dobError");

    enrollError.style.display = "none";
    dobError.style.display = "none";

    if (enroll === "") {
        enrollError.style.display = "block";
        return;
    }

    if (!/^\d{2}\/\d{2}\/\d{4}$/.test(dob)) {
        dobError.style.display = "block";
        return;
    }

    // Remove 'E' if present
    enroll = enroll.replace(/^E/i, "");

    // Convert DOB format DD/MM/YYYY → DD-MM-YYYY
    let dobFormatted = dob.replace(/\//g, "-");

    // Example BTEUP Result URL (Modify if needed)
    finalURL = `https://bteup.ac.in/result.aspx?enroll=${enroll}&dob=${dobFormatted}`;

    document.getElementById("successMsg").style.display = "block";
    document.getElementById("viewResultBtn").style.display = "block";
}

function openResult() {
    if (finalURL !== "") {
        window.open(finalURL, "_blank");
    }
}
</script>

</body>
</html>
