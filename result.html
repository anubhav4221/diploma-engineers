<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Result | Diploma Engineers</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body{
    margin:0;
    font-family:'Segoe UI';
    background:linear-gradient(135deg,#020617,#0f172a);
    color:white;
}

/* NAVBAR */
.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
    background:#020617;
    border-bottom:1px solid #1e293b;
}

.back{
    color:#22c55e;
    text-decoration:none;
    border:1px solid #22c55e;
    padding:5px 15px;
    border-radius:20px;
}

.title{
    font-weight:bold;
    color:#22c55e;
}

/* MAIN */
.container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:90vh;
}

/* CARD */
.card{
    width:420px;
    background:#111;
    padding:30px;
    border-radius:20px;
    border:1px solid #222;
    text-align:center;
}

/* BUTTON */
.option{
    width:100%;
    padding:15px;
    margin:10px 0;
    border-radius:12px;
    border:none;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.main-btn{
    background:#22c55e;
}

.reval-btn{
    background:#0ea5e9;
}

.option:hover{
    transform:scale(1.03);
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <a href="index.html" class="back">⬅ Back</a>
    <div class="title">Diploma Engineers</div>
</div>

<!-- MAIN -->
<div class="container">
    <div class="card">

        <h2>Select Result Type</h2>
        <p style="color:#aaa;">Choose which result you want to check</p>

        <button class="option main-btn" onclick="goMain()">
            📄 Main Result
        </button>

        <button class="option reval-btn" onclick="goReval()">
            🔁 Revaluation Result
        </button>

    </div>
</div>

<script>
function goMain(){
    window.location.href = "main-result.html";
}

function goReval(){
    window.location.href = "reval-result.html";
}
</script>

</body>
</html>
