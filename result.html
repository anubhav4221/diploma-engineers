<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Diploma Engineers | Result Tool</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
body{
    background:#000;
    color:white;
    font-family:'Poppins',sans-serif;
}

/* NAVBAR */
.navbar{
    background:#0a0a0a;
    border-bottom:1px solid #222;
}

/* BACK BUTTON */
.back-btn{
    color:#22c55e;
    border:1px solid #22c55e;
    padding:5px 15px;
    border-radius:20px;
    text-decoration:none;
}
.back-btn:hover{
    background:#22c55e;
    color:#000;
}

/* CARD */
.result-card{
    background:#111;
    padding:30px;
    border-radius:20px;
    max-width:500px;
    margin:60px auto;
    border:1px solid #222;
}

/* INPUT */
input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #333;
    background:#000;
    color:white;
}

/* BUTTON */
.btn-main{
    width:100%;
    padding:12px;
    background:#22c55e;
    border:none;
    border-radius:10px;
    color:black;
    font-weight:bold;
    margin-top:10px;
}

/* ERROR */
.error{
    color:#ef4444;
    display:none;
}
.error.active{
    display:block;
}

/* SUCCESS */
.success{
    display:none;
    color:#22c55e;
    text-align:center;
    margin-top:15px;
}
.success.active{
    display:block;
}

/* VIEW BUTTON */
.view-btn{
    display:none;
}
.view-btn.active{
    display:block;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar p-3">
<div class="container d-flex justify-content-between">
<a href="index.html" class="back-btn">⬅ Back</a>
<span class="text-success fw-bold">Diploma Engineers</span>
</div>
</nav>

<!-- CARD -->
<div class="result-card">

<h3 class="text-center mb-3">BTE Result Link Generator</h3>

<input type="text" id="enrollNo" placeholder="Enrollment Number (E251....)">
<div id="enrollError" class="error">Enter valid Enrollment</div>

<input type="text" id="dobInput" placeholder="DOB (DD/MM/YYYY)">
<div id="dobError" class="error">Enter valid DOB</div>

<button id="generateBtn" class="btn-main">Generate Link</button>

<div id="successMsg" class="success">✅ Link Generated Successfully</div>

<button id="viewBtn" class="btn-main view-btn">View Result</button>

</div>

<script>

// elements
const enroll = document.getElementById("enrollNo");
const dob = document.getElementById("dobInput");
const genBtn = document.getElementById("generateBtn");
const viewBtn = document.getElementById("viewBtn");

const enrollErr = document.getElementById("enrollError");
const dobErr = document.getElementById("dobError");
const success = document.getElementById("successMsg");

let finalUrl = "";

// DOB validation
function validDOB(d){
    const r = /^(\d{2})\/(\d{2})\/(\d{4})$/;
    if(!r.test(d)) return false;
    let [day,month,year] = d.split('/').map(Number);
    let max = new Date(year,month,0).getDate();
    return day>=1 && day<=max;
}

// GENERATE
genBtn.onclick = () => {

    enrollErr.classList.remove("active");
    dobErr.classList.remove("active");

    let e = enroll.value.trim();
    let d = dob.value.trim();

    let error = false;

    if(e===""){
        enrollErr.classList.add("active");
        error=true;
    }

    if(!validDOB(d)){
        dobErr.classList.add("active");
        error=true;
    }

    if(error) return;

    // ✅ IMPORTANT FIX (KEEP E)
    let encEnroll = btoa(e);
    let encDob = encodeURIComponent(btoa(d));

    finalUrl = `https://result.bteexam.com/Odd_Semester/reval/REVAL_RollNo.aspx?id=${encEnroll}&id2=${encDob}`;

    success.classList.add("active");
    viewBtn.classList.add("active");
};

// VIEW RESULT
viewBtn.onclick = () => {
    if(finalUrl){
        window.open(finalUrl,"_blank");
    }
};

// ENTER KEY
[enroll,dob].forEach(i=>{
    i.addEventListener("keypress",e=>{
        if(e.key==="Enter") genBtn.click();
    });
});

</script>

</body>
</html>
