<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BTEUP Result</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
}

/* HEADER */
.header{
    background:#020617;
    padding:15px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

/* CARD */
.container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:80vh;
}

.card{
    background:#1e293b;
    padding:30px;
    border-radius:12px;
    width:350px;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.card h2{
    text-align:center;
    margin-bottom:20px;
}

/* INPUT */
input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:6px;
    background:#0f172a;
    color:white;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    background:#3b82f6;
    border:none;
    border-radius:6px;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#2563eb;
}

/* NOTE */
.note{
    font-size:12px;
    color:#f87171;
    margin-top:5px;
}
</style>

</head>
<body>

<div class="header">
BTEUP RESULT PORTAL
</div>

<div class="container">
    <div class="card">
        <h2>Check Result</h2>

        <input type="text" placeholder="Enrollment Number">
        <div class="note">Example: E1610933000002</div>

        <input type="text" placeholder="Date of Birth (DD/MM/YYYY)">
        <div class="note">Example: 28/09/2000</div>

        <button>Show Result</button>
    </div>
</div>

</body>
</html>
