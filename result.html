
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Result - Diploma Engineers</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#000;
    color:white;
    font-family:'Poppins',sans-serif;
}

/* NAVBAR */
.navbar{
    background:#0a0a0a;
    border-bottom:1px solid #222;
}

/* BACK BUTTON */
.back-btn{
    color:#22c55e;
    border:1px solid #22c55e;
    padding:5px 15px;
    border-radius:20px;
    text-decoration:none;
}
.back-btn:hover{
    background:#22c55e;
    color:#000;
}

/* CARD */
.result-box{
    background:#111;
    padding:30px;
    border-radius:20px;
    max-width:500px;
    margin:50px auto;
    border:1px solid #222;
}

/* INPUT */
input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #333;
    background:#000;
    color:white;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    background:#22c55e;
    border:none;
    border-radius:10px;
    color:black;
    font-weight:bold;
}

button.loading{
    opacity:0.6;
}

/* SUCCESS */
.success{
    display:none;
    margin-top:15px;
    color:#22c55e;
    text-align:center;
}
.success.active{
    display:block;
}

/* VIEW BUTTON */
.view-btn{
    display:none;
    margin-top:10px;
}
.view-btn.active{
    display:block;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar p-3">
<div class="container d-flex justify-content-between">
<a href="index.html" class="back-btn">⬅ Back</a>
<span class="text-success fw-bold">Diploma Engineers</span>
</div>
</nav>

<!-- RESULT BOX -->
     
<div class="result-box">

    <h4 class="text-center mb-3">Check BTEUP Result</h4>

    <input type="text" id="enrollNo" placeholder="Enter Enrollment Number (E251XXXXX)">
    <div id="enrollError" class="text-danger" style="display:none;">Enter valid enrollment</div>

    <input type="text" id="dobInput" placeholder="Enter DOB (DD/MM/YYYY)">
    <div id="dobError" class="text-danger" style="display:none;">Enter valid DOB</div>

    <button id="generateBtn">Generate Result</button>

    <div id="successMsg" class="success">✅ Link Generated Successfully</div>

    <button id="viewResultBtn" class="view-btn btn btn-success">
        View Result
    </button>

</div> 
<!-- FOOTER -->
<div id="footer"></div>

<script>
fetch("footer.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("footer").innerHTML = data;
  });
</script>
