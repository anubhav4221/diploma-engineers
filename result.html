<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diploma Engineers | BTE Result</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body{
    margin:0;
    font-family:'Segoe UI';
    background:#0b1220;
    color:white;
}

/* NAVBAR */
.navbar{
    background:#111827;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-weight:bold;
    color:#22c55e;
}

/* CARD */
.card{
    max-width:450px;
    margin:60px auto;
    background:#111;
    padding:30px;
    border-radius:20px;
    border:1px solid #222;
}

/* INPUT */
input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #333;
    background:#000;
    color:white;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#22c55e;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}

/* SUCCESS */
.success{
    display:none;
    margin-top:15px;
    color:#22c55e;
    text-align:center;
}

.success.active{
    display:block;
}

/* VIEW BUTTON */
.view{
    display:none;
    margin-top:10px;
}

.view.active{
    display:block;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">Diploma Engineers</div>
</div>

<div class="card">
    <h2>BTE Revaluation Result</h2>

    <input type="text" id="enroll" placeholder="Enrollment No (E251...)" />
    <input type="text" id="dob" placeholder="DD/MM/YYYY" />

    <button onclick="generate()">Generate Link</button>

    <div class="success" id="msg">✅ Link Generated</div>

    <button class="view" id="openBtn" onclick="openResult()">Open Result</button>
</div>

<script>
let finalURL = "";

// DOB validation
function validDOB(d){
    return /^(\d{2})\/(\d{2})\/(\d{4})$/.test(d);
}

// MAIN LOGIC (FINAL CORRECT)
function generate(){
    let enroll = document.getElementById("enroll").value.trim();
    let dob = document.getElementById("dob").value.trim();

    if(!enroll){
        alert("Enter Enrollment");
        return;
    }

    if(!validDOB(dob)){
        alert("Enter DOB in DD/MM/YYYY");
        return;
    }

    let encEnroll = btoa(enroll); // KEEP E
    let encDob = encodeURIComponent(btoa(dob));

    finalURL = `https://result.bteexam.com/Odd_Semester/reval/REVAL_RollNo.aspx?id=${encEnroll}&id2=${encDob}`;

    document.getElementById("msg").classList.add("active");
    document.getElementById("openBtn").classList.add("active");
}

// OPEN RESULT
function openResult(){
    if(finalURL){
        window.open(finalURL, "_blank");
    }
}
</script>

</body>
</html>
