<section style="padding:50px; text-align:center;">

<h2>🎓 Check Your Result</h2>

<form onsubmit="goToResult(event)">
    
    <input type="text" id="roll" placeholder="Enter Enrollment No"
    style="padding:10px; margin:10px; width:250px; border-radius:10px; border:1px solid #ccc;" required>

    <br>

    <input type="text" id="dob" placeholder="DD/MM/YYYY"
    style="padding:10px; margin:10px; width:250px; border-radius:10px; border:1px solid #ccc;" required>

    <br>

    <button type="submit" style="
        background:#ff7b00;
        color:white;
        padding:12px 25px;
        border:none;
        border-radius:25px;
        cursor:pointer;">
        Show Result
    </button>

</form>

</section>

<script>
function goToResult(event){
    event.preventDefault();

    let roll = document.getElementById("roll").value;
    let dob = document.getElementById("dob").value;

    // Direct official result page open
    window.open("http://result.bteupexam.in/odd_result/ROLLNO.aspx", "_blank");

    alert("👉 Please enter your details again on official website for result.");
}
</script>
