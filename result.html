<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTEUP Result Portal</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body{
    font-family: Arial;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    margin:0;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* HEADER SPACE */
#header{
    width:100%;
}

/* CARD */
.card{
    background:#fff;
    padding:25px;
    width:350px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    margin-top:80px;
}

h2{
    text-align:center;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:12px;
    border:none;
    background:#007bff;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

.loader, .success{
    display:none;
    text-align:center;
    margin-top:10px;
}

.success{
    color:green;
}
</style>
</head>

<body>

<!-- ✅ HEADER LOAD -->
<div id="header"></div>

<!-- ✅ RESULT CARD -->
<div class="card">
    <h2><i class="fas fa-graduation-cap"></i> BTEUP Result</h2>

    <input type="text" id="enroll" placeholder="Enrollment No (E251...)" />
    <input type="text" id="dob" placeholder="DD/MM/YYYY" />

    <button onclick="getResult()">Get Result</button>

    <div class="loader" id="loader">⏳ Processing...</div>
    <div class="success" id="success">✅ Opening Result...</div>
</div>

<!-- ✅ SCRIPT -->
<script>
function getResult(){
    let enroll = document.getElementById("enroll").value.trim();
    let dob = document.getElementById("dob").value.trim();

    if(enroll=="" || dob==""){
        alert("Enter all details");
        return;
    }

    document.getElementById("loader").style.display="block";

    setTimeout(()=>{
        let id = btoa(enroll);
        let id2 = encodeURIComponent(btoa(dob));

        let url = `https://result.bteexam.com/Odd_Semester/reval/REVAL_RollNo.aspx?id=${id}&id2=${id2}`;

        document.getElementById("loader").style.display="none";
        document.getElementById("success").style.display="block";

        window.open(url, "_blank");

    },1000);
}
</script>

<!-- ✅ HEADER LOAD SCRIPT -->
<script>
fetch("./header.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("header").innerHTML = data;
  });
</script>

</body>
</html>
