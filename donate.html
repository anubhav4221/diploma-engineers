</html><!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donate Study Material</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f4f7fb;
    font-family:'Poppins', sans-serif;
}

.container-box{
    max-width:600px;
    margin:60px auto;
    background:#fff;
    padding:30px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    font-weight:700;
    margin-bottom:20px;
}

.btn-submit{
    background:#ff7b00;
    color:white;
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="container-box">

<h2>📚 Donate Study Material</h2>

<form action="https://formspree.io/f/xxxxx" method="POST" enctype="multipart/form-data">

<!-- Name -->
<input type="text" name="name" class="form-control mb-3" placeholder="Your Name" required>

<!-- College -->
<input type="text" name="college" class="form-control mb-3" placeholder="College Name" required>

<!-- Mobile -->
<input type="tel" name="mobile" class="form-control mb-3" placeholder="Mobile Number" required>

<!-- Branch -->
<select name="branch" class="form-control mb-3" required>
<option value="">Select Branch</option>
<option>CSE</option>
<option>Mechanical</option>
<option>Civil</option>
<option>Electrical</option>
<option>Electronics</option>
<option>IT</option>
</select>

<!-- Semester -->
<select name="semester" class="form-control mb-3" required>
<option value="">Select Semester</option>
<option>1st</option>
<option>2nd</option>
<option>3rd</option>
<option>4th</option>
<option>5th</option>
<option>6th</option>
</select>

<!-- File Upload -->
<label class="mb-2">Upload PDF / Notes</label>
<input type="file" name="file" class="form-control mb-3" required>

<!-- Message -->
<textarea name="message" class="form-control mb-3" placeholder="About file (optional)"></textarea>

<button type="submit" class="btn-submit">Submit Donation</button>

</form>

<p class="text-center mt-3 text-success" id="msg"></p>

</div>

<script>
const form = document.querySelector("form");
const msg = document.getElementById("msg");

form.addEventListener("submit", function(e){
    e.preventDefault();

    const data = new FormData(form);

    fetch(form.action, {
        method: "POST",
        body: data,
        headers: { 'Accept': 'application/json' }
    })
    .then(res => {
        msg.innerHTML = "✅ Thank you for donation!";
        form.reset();
    })
    .catch(err => {
        msg.innerHTML = "❌ Error! Try again";
    });
});
</script>

</body>
</html>


<!-- FOOTER -->
<div id="footer"></div>

<script>
fetch("footer.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("footer").innerHTML = data;
  });
</script>
