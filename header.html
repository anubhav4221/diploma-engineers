<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu Fix</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body{
  margin:0;
  font-family:Arial;
}

/* HEADER */
header{
  background:#1d3557;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:sticky;
  top:0;
  z-index:1000;
}

/* LOGO */
.logo{
  color:white;
  font-size:20px;
  font-weight:bold;
}

/* MENU ICON */
.menu-btn{
  font-size:26px;
  color:white;
  cursor:pointer;
  z-index:3000;
}

/* OVERLAY */
.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  z-index:2000;
}

/* SIDE MENU */
.side-menu{
  position:fixed;
  top:0;
  right:-260px;
  width:260px;
  height:100%;
  background:#1d3557;
  transition:0.3s;
  padding-top:60px;
  z-index:2500;
}

/* OPEN STATE */
.side-menu.open{
  right:0;
}

.overlay.show{
  display:block;
}

.side-menu a{
  display:block;
  padding:15px;
  color:white;
  text-decoration:none;
}

.close{
  position:absolute;
  top:10px;
  right:15px;
  font-size:22px;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <div class="logo">Diploma Engineers</div>

  <div class="menu-btn" id="menuBtn">
    <i class="fa fa-bars"></i>
  </div>
</header>

<!-- OVERLAY -->
<div class="overlay" id="overlay"></div>

<!-- SIDE MENU -->
<div class="side-menu" id="sideMenu">

  <div class="close" id="closeBtn">
    <i class="fa fa-times"></i>
  </div>

  <a href="#">Home</a>
  <a href="#">About</a>
  <a href="#">Syllabus</a>
  <a href="#">Notes</a>
  <a href="#">Result</a>
  <a href="#">Team</a>
  <a href="#">Feedback</a>

</div>

<script>
const menuBtn = document.getElementById("menuBtn");
const sideMenu = document.getElementById("sideMenu");
const overlay = document.getElementById("overlay");
const closeBtn = document.getElementById("closeBtn");

function openMenu(){
  sideMenu.classList.add("open");
  overlay.classList.add("show");
}

function closeMenu(){
  sideMenu.classList.remove("open");
  overlay.classList.remove("show");
}

menuBtn.addEventListener("click", openMenu);
closeBtn.addEventListener("click", closeMenu);
overlay.addEventListener("click", closeMenu);
</script>

</body>
</html>
