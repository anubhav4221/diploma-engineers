<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Working Mobile Menu</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body{
  margin:0;
  font-family:Arial;
}

/* HEADER */
header{
  background:#1d3557;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:sticky;
  top:0;
  z-index:9999;
}

/* MENU ICON */
#menuBtn{
  font-size:28px;
  cursor:pointer;
  user-select:none;
  z-index:99999;
}

/* OVERLAY */
#overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  z-index:9998;
}

/* SIDE MENU */
#sideMenu{
  position:fixed;
  top:0;
  right:-270px;
  width:260px;
  height:100%;
  background:#1d3557;
  transition:0.3s;
  padding-top:60px;
  z-index:99999;
}

/* LINKS */
#sideMenu a{
  display:block;
  padding:15px;
  color:white;
  text-decoration:none;
}

/* CLOSE BUTTON */
#closeBtn{
  position:absolute;
  top:10px;
  right:15px;
  font-size:22px;
  cursor:pointer;
  color:white;
}

/* ACTIVE */
#sideMenu.active{
  right:0;
}

#overlay.active{
  display:block;
}
</style>
</head>

<body>

<header>
  <div>Diploma Engineers</div>
  <div id="menuBtn"><i class="fa fa-bars"></i></div>
</header>

<div id="overlay"></div>

<div id="sideMenu">

  <div id="closeBtn"><i class="fa fa-times"></i></div>

  <a href="#">Home</a>
  <a href="#">About</a>
  <a href="#">Syllabus</a>
  <a href="#">Notes</a>
  <a href="#">Result</a>

</div>

<script>
const menuBtn = document.getElementById("menuBtn");
const sideMenu = document.getElementById("sideMenu");
const overlay = document.getElementById("overlay");
const closeBtn = document.getElementById("closeBtn");

menuBtn.onclick = function(){
  sideMenu.classList.add("active");
  overlay.classList.add("active");
}

closeBtn.onclick = closeMenu;
overlay.onclick = closeMenu;

function closeMenu(){
  sideMenu.classList.remove("active");
  overlay.classList.remove("active");
}
</script>

</body>
</html>
