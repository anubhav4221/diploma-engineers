<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diploma Engineers</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
}

/* HEADER */
.pro-header{
  background:#1d3557;
  padding:15px 0;
  position:sticky;
  top:0;
  z-index:1000;
}

/* LOGO */
.logo a{
  color:white;
  font-size:24px;
  font-weight:700;
  text-decoration:none;
}
.logo span{ color:#ffb703; }

/* DESKTOP MENU */
.nav-menu{
  display:flex;
  gap:18px;
}

.nav-menu a{
  color:white;
  text-decoration:none;
  padding:5px 10px;
  font-size:14px;
  border-radius:5px;
}
.nav-menu a:hover{
  background:rgba(255,255,255,0.15);
}

/* HAMBURGER */
.menu-toggle{
  display:none;
  color:white;
  font-size:26px;
  cursor:pointer;
  z-index:2001;
}

/* OVERLAY */
.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  opacity:0;
  visibility:hidden;
  transition:0.3s;
  z-index:2000;
}
.overlay.show{
  opacity:1;
  visibility:visible;
}

/* SIDE MENU */
.side-menu{
  position:fixed;
  top:0;
  right:-260px;
  width:260px;
  height:100%;
  background:#1d3557;
  padding-top:60px;
  transition:0.3s;
  z-index:2002;
}

.side-menu.active{
  right:0;
}

.side-menu a{
  display:block;
  padding:15px;
  color:white;
  text-decoration:none;
}
.side-menu a:hover{
  background:rgba(255,255,255,0.1);
}

/* CLOSE */
.close-btn{
  position:absolute;
  top:15px;
  right:15px;
  color:white;
  font-size:22px;
  cursor:pointer;
}

/* RESPONSIVE */
@media(max-width:768px){
  .nav-menu{
    display:none;
  }
  .menu-toggle{
    display:block;
  }
}
</style>
</head>

<body>

<header class="pro-header">
  <div class="container d-flex justify-content-between align-items-center">

    <div class="logo">
      <a href="#">Diploma <span>Engineers</span></a>
    </div>

    <nav class="nav-menu">
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Syllabus</a>
      <a href="#">Notes</a>
      <a href="#">Result</a>
      <a href="#">Team</a>
      <a href="#">Feedback</a>
    </nav>

    <div class="menu-toggle" id="openMenu">
      <i class="fa fa-bars"></i>
    </div>

  </div>
</header>

<!-- OVERLAY -->
<div class="overlay" id="overlay"></div>

<!-- SIDE MENU -->
<div class="side-menu" id="sideMenu">

  <div class="close-btn" id="closeMenu">
    <i class="fa fa-times"></i>
  </div>

  <a href="#">Home</a>
  <a href="#">About</a>
  <a href="#">Syllabus</a>
  <a href="#">Notes</a>
  <a href="#">Result</a>
  <a href="#">Team</a>
  <a href="#">Feedback</a>

</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const sideMenu = document.getElementById("sideMenu");
  const overlay = document.getElementById("overlay");
  const openMenu = document.getElementById("openMenu");
  const closeMenu = document.getElementById("closeMenu");

  openMenu.addEventListener("click", function(){
    sideMenu.classList.add("active");
    overlay.classList.add("show");
  });

  closeMenu.addEventListener("click", function(){
    sideMenu.classList.remove("active");
    overlay.classList.remove("show");
  });

  overlay.addEventListener("click", function(){
    sideMenu.classList.remove("active");
    overlay.classList.remove("show");
  });

});
</script>

</body>
</html>
