<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diploma Engineers</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

/* HEADER */
header{
  background:#1d3557;
  color:white;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  position:sticky;
  top:0;
  z-index:1000;
}

/* LOGO */
.logo{
  font-size:20px;
  font-weight:bold;
}
.logo span{
  color:#ffb703;
}

/* NAV */
nav{
  display:flex;
  gap:20px;
}

nav a{
  color:white;
  text-decoration:none;
  padding:6px 10px;
  border-radius:5px;
  transition:0.3s;
}

nav a:hover{
  background:rgba(255,255,255,0.15);
}

/* HAMBURGER */
.menu-btn{
  display:none;
  font-size:26px;
  cursor:pointer;
}

/* OVERLAY */
.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  z-index:999;
}

/* SIDE MENU */
.side-menu{
  position:fixed;
  top:0;
  right:-260px;
  width:260px;
  height:100%;
  background:#1d3557;
  padding-top:60px;
  transition:0.3s;
  z-index:1000;
}

.side-menu a{
  display:block;
  padding:15px;
  color:white;
  text-decoration:none;
}

.side-menu a:hover{
  background:rgba(255,255,255,0.1);
}

/* CLOSE */
.close-btn{
  position:absolute;
  top:15px;
  right:15px;
  font-size:22px;
  cursor:pointer;
  color:white;
}

/* ACTIVE STATES */
.side-menu.active{
  right:0;
}

.overlay.active{
  display:block;
}

/* RESPONSIVE */
@media(max-width:768px){
  nav{
    display:none;
  }

  .menu-btn{
    display:block;
  }
}
</style>
</head>

<body>

<header>

  <div class="logo">Diploma <span>Engineers</span></div>

  <nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Syllabus</a>
    <a href="#">Notes</a>
    <a href="#">Result</a>
    <a href="#">Team</a>
  </nav>

  <div class="menu-btn" id="openBtn">
    <i class="fa fa-bars"></i>
  </div>

</header>

<!-- OVERLAY -->
<div class="overlay" id="overlay"></div>

<!-- SIDE MENU -->
<div class="side-menu" id="sideMenu">

  <div class="close-btn" id="closeBtn">
    <i class="fa fa-times"></i>
  </div>

  <a href="#">Home</a>
  <a href="#">About</a>
  <a href="#">Syllabus</a>
  <a href="#">Notes</a>
  <a href="#">Result</a>
  <a href="#">Team</a>

</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

  const sideMenu = document.getElementById("sideMenu");
  const overlay = document.getElementById("overlay");
  const openBtn = document.getElementById("openBtn");
  const closeBtn = document.getElementById("closeBtn");

  openBtn.addEventListener("click", function(){
    sideMenu.classList.add("active");
    overlay.classList.add("active");
  });

  closeBtn.addEventListener("click", closeMenu);
  overlay.addEventListener("click", closeMenu);

  function closeMenu(){
    sideMenu.classList.remove("active");
    overlay.classList.remove("active");
  }

});
</script>

</body>
</html>
