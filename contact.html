<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact - Diploma Engineers</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#000;
    color:white;
    font-family:'Segoe UI';
}

/* NAVBAR */
.navbar{
    background:#000;
    border-bottom:1px solid #333;
}

/* FORM BOX */
.contact-box{
    background:#111;
    padding:30px;
    margin:40px auto;
    max-width:500px;
    border-radius:15px;
}

/* INPUT */
input, textarea{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:10px;
    border:none;
}

/* BUTTON */
.btn-main{
    background:#ff7b00;
    border:none;
    padding:10px;
    border-radius:20px;
    color:white;
    width:100%;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar p-2">
<a href="index.html" style="color:white; text-decoration:none;">⬅ Back to Home</a>
</nav>

<!-- TITLE -->
<div class="text-center mt-4">
<h1>📞 Contact Us</h1>
<p>Get in touch with Diploma Engineers</p>
</div>

<!-- FORM -->
<div class="contact-box">

<form>

<input type="text" placeholder="Your Name" required>

<input type="email" placeholder="Your Email" required>

<textarea rows="4" placeholder="Your Message"></textarea>

<button class="btn-main">Send Message</button>

</form>

</div>

<!-- EXTRA INFO -->
<div class="text-center">
<p>Email: diplomaengineers@gmail.com</p>
<p>Instagram: @diploma_engineers</p>
</div>

</body>
</html>
