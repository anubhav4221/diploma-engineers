<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diploma Engineers</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<style>

html{scroll-behavior:smooth;}

body{
    margin:0;
    font-family:'Poppins', sans-serif;
    padding-top:80px;
    background:#f4f7fb;
}

/* NAVBAR */
.navbar{
    background: rgba(29,53,87,0.9);
    backdrop-filter: blur(10px);
}
.navbar a{color:white !important;}
.nav-link{margin-left:15px; position:relative;}
.nav-link::after{
    content:"";
    width:0%;
    height:2px;
    background:#ff7b00;
    position:absolute;
    left:0; bottom:0;
    transition:0.3s;
}
.nav-link:hover::after{width:100%;}

/* SECTION */
.section{padding:60px 20px;}
.title{text-align:center; font-weight:700; margin-bottom:40px;}
.title span{color:#ff7b00;}

/* CONTACT FORM */
.contact-form{
    background:#fff;
    padding:30px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.contact-form input,
.contact-form textarea{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border-radius:10px;
    border:1px solid #ddd;
    outline:none;
    font-size:14px;
}

.contact-form input:focus,
.contact-form textarea:focus{
    border-color:#ff7b00;
}

.contact-form button{
    width:100%;
    padding:12px;
    background:#ff7b00;
    border:none;
    color:#fff;
    font-weight:600;
    border-radius:10px;
    transition:0.3s;
}

.contact-form button:hover{
    background:#e66900;
}

/* FOOTER */
footer{
    background:#0b2545;
    color:#ccc;
    padding:40px 20px;
}
footer h4{color:#fff;}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg fixed-top">
<div class="container">

<a class="navbar-brand" href="#">
  <span style="color:white; font-weight:bold;">Diploma</span>
  <span style="color:yellow; font-weight:bold;">Engineers</span>
</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
<li class="nav-item"><a class="nav-link" href="notes.html">Sem. Books & Notes</a></li>
<li class="nav-item"><a class="nav-link" href="syllabus.html">Syllabus</a></li>
<li class="nav-item"><a class="nav-link" href="result.html">Result</a></li>
<li class="nav-item"><a class="nav-link" href="jeecup.html">Jeecup Guidance</a></li>
<li class="nav-item"><a class="nav-link" href="studentfeedback.html">Feedback</a></li>
<li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
</ul>
</div>

</div>
</nav>


<!-- CONTACT SECTION -->
<section class="section">
<div class="container">

<h2 class="title">Contact <span>Us</span></h2>
<p class="text-center text-secondary mb-4">We are here to help you</p>

<div class="row justify-content-center">
<div class="col-md-6">

<form action="https://formsubmit.co/astar22072006@gmail.com" method="POST" class="contact-form">

<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_template" value="table">

<input type="text" name="name" placeholder="Your Name" required>
<input type="email" name="email" placeholder="Your Email" required>
<textarea name="message" rows="5" placeholder="Your Message" required></textarea>

<button type="submit">Send Message</button>

</form>

<p class="text-center mt-3">⚡ Response time: 24 hours</p>

</div>
</div>

</div>
</section>

<!-- FOOTER -->
<div id="footer"></div>

<script>
fetch("footer.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("footer").innerHTML = data;
  });
</script>

</body>
</html>
