<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact - Diploma Engineers</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#000;
    color:white;
    font-family:'Segoe UI';
    min-height:100vh;
    margin:0;
}

/* NAVBAR */
.navbar{
    background:#000;
    border-bottom:1px solid #333;
}

/* CONTACT CARD STYLE */
.contact-box{
    background:#111;
    padding:25px;
    border-radius:15px;
    max-width:500px;
    margin:40px auto;
    box-shadow:0 0 20px rgba(255,255,255,0.05);
    transition:0.3s;
}

.contact-box:hover{
    transform:scale(1.02);
}

h1{
    text-align:center;
    margin-top:20px;
}

input, textarea{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #333;
    background:#000;
    color:white;
    outline:none;
}

button{
    width:100%;
    padding:10px;
    background:#22c55e;
    border:none;
    border-radius:8px;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#16a34a;
}

/* INFO BOX */
.info{
    text-align:center;
    margin-top:20px;
    color:#aaa;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar p-2">
<a href="index.html" style="color:white;">⬅ Back to Home</a>
</nav>

<!-- TITLE -->
<h1>📩 Contact Us</h1>
<p class="text-center text-secondary">We are here to help you</p>

<!-- CONTACT FORM -->
<div class="contact-box">

<form action="mailto:astar22072006@gmail.com" method="post" enctype="text/plain">

    <input type="text" name="name" placeholder="Your Name" required>

    <input type="email" name="email" placeholder="Your Email" required>

    <textarea name="message" rows="5" placeholder="Your Message" required></textarea>

    <button type="submit">Send Message</button>

</form>

</div>

<!-- INFO -->
<div class="info">

⚡ Response time: 24 hours
</div>

</body>
</html>
