<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact - Diploma Engineers</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#000;
    color:white;
    font-family:'Poppins',sans-serif;
    min-height:100vh;
}

.navbar{
    background:#0a0a0a;
    border-bottom:1px solid #222;
}

.back-btn{
    color:#22c55e;
    border:1px solid #22c55e;
    padding:5px 15px;
    border-radius:20px;
    text-decoration:none;
}
.back-btn:hover{
    background:#22c55e;
    color:#000;
}

.contact-box{
    background:#111;
    padding:30px;
    border-radius:20px;
    max-width:500px;
    margin:40px auto;
    border:1px solid #222;
    box-shadow:0 0 20px rgba(34,197,94,0.1);
    backdrop-filter: blur(10px);
}

h1{
    text-align:center;
    margin-top:20px;
    color:#22c55e;
}

input, textarea{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #333;
    background:#000;
    color:white;
}

input:focus, textarea:focus{
    border-color:#22c55e;
}

button{
    width:100%;
    padding:12px;
    background:#22c55e;
    border:none;
    border-radius:10px;
    color:black;
    font-weight:600;
}

button:hover{
    background:#16a34a;
}

.info{
    text-align:center;
    margin-top:20px;
    color:#aaa;
}

.main-footer {
    background: #0a0a0a;
    color: #fff;
    padding: 50px 0 20px;
}

.footer-box {
    margin-bottom: 20px;
}

.footer-box h4 {
    margin-bottom: 15px;
}

.footer-box ul {
    list-style: none;
    padding: 0;
}

.footer-box ul li a {
    text-decoration: none;
    color: #ccc;
}

.footer-box ul li a:hover {
    color: #22c55e;
}

.footer-bottom {
    text-align: center;
    border-top: 1px solid #444;
    margin-top: 20px;
    padding-top: 10px;
    font-size: 13px;
    color: #aaa;
}
</style>

</head>

<body>

<nav class="navbar p-3">
<div class="container d-flex justify-content-between">
<a href="index.html" class="back-btn">⬅ Back</a>
<span class="text-success fw-bold">Diploma Engineers</span>
</div>
</nav>

<h1>📩 Contact Us</h1>
<p class="text-center text-secondary">We are here to help you</p>

<div class="contact-box">

<form onsubmit="sendMsg(event)">
    <input type="text" id="name" placeholder="Your Name" required>
    <input type="email" id="email" placeholder="Your Email" required>
    <textarea id="message" rows="5" placeholder="Your Message" required></textarea>
    <button type="submit">Send Message</button>
</form>

</div>

<div class="info">
⚡ Response time: 24 hours
</div>


<script>
function sendMsg(e){
    e.preventDefault();

    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let msg = document.getElementById("message").value;

    let subject = "Contact from Diploma Engineers";
    let body = "Name: " + name + "%0D%0A"
             + "Email: " + email + "%0D%0A"
             + "Message: " + msg;

    let url = "mailto:astar22072006@gmail.com?subject=" + subject + "&body=" + body;

    window.location.href = url;
}
</script>

</body>
</html>
