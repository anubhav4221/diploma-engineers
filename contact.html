.navbar{

.back-btn{

.contact-box{

    border:1px solid #222;

}

input, textarea{

    border-radius:10px;

    background:#000;
    color:white;
    outline:none;
}

input:focus, textarea:focus{
    border-color:#22c55e;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    background:#22c55e;
    border:none;
    border-radius:10px;
    color:black;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

button:hover{

}

/* INFO */
.info{

/* SOCIAL */
.social{
