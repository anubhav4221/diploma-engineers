<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diploma Engineers - Registration</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}
.container{
    background:#111;
    padding:40px;
    border-radius:15px;
    width:360px;
    box-shadow:0 10px 25px rgba(0,0,0,0.5);
    text-align:center;
}
.container h2{
    color:#00d4ff;
    margin-bottom:20px;
}
.input-box{
    margin:12px 0;
    text-align:left;
}
.input-box label{
    color:#aaa;
    font-size:14px;
}
.input-box input{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:none;
    outline:none;
    border-radius:8px;
    background:#222;
    color:#fff;
}
button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    background:#00d4ff;
    color:#000;
    font-weight:600;
    cursor:pointer;
}
button:hover{background:#00aacc;}
.error{color:red;font-size:13px;margin-top:5px;}
.success{color:#00ff88;font-size:13px;margin-top:5px;}
</style>
</head>
<body>

<div class="container">
    <h2>Register Account</h2>

    <form id="registerForm">
        <div class="input-box">
            <label>Full Name</label>
            <input type="text" id="name" required>
        </div>

        <div class="input-box">
            <label>Email</label>
            <input type="email" id="email" required>
        </div>

        <div class="input-box">
            <label>Password</label>
            <input type="password" id="password" required>
        </div>

        <div class="input-box">
            <label>Confirm Password</label>
            <input type="password" id="confirmPassword" required>
        </div>

        <div class="error" id="errorMsg"></div>
        <div class="success" id="successMsg"></div>

        <button type="submit">Register</button>
    </form>
</div>

<script>
const form = document.getElementById('registerForm');
const errorMsg = document.getElementById('errorMsg');
const successMsg = document.getElementById('successMsg');

form.addEventListener('submit', function(e){
    e.preventDefault();

    const name = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;

    errorMsg.textContent = "";
    successMsg.textContent = "";

    if(password !== confirmPassword){
        errorMsg.textContent = "Passwords do not match";
        return;
    }

    if(localStorage.getItem(email)){
        errorMsg.textContent = "User already exists";
        return;
    }

    const userData = {
        name: name,
        email: email,
        password: password
    };

    localStorage.setItem(email, JSON.stringify(userData));

    successMsg.textContent = "Registration Successful ✔";

    form.reset();
});
</script>

</body>
</html>
