<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Feedback System</title>

<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    padding:30px;
}

.container{
    width:400px;
    background:#1e293b;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.4);
}

h2{text-align:center}

textarea,input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
    border:none;
    outline:none;
}

.stars{
    text-align:center;
    margin:10px 0;
}

.star{
    font-size:25px;
    cursor:pointer;
    color:#555;
}

.star.active{
    color:gold;
}

button{
    width:100%;
    padding:10px;
    background:#22c55e;
    border:none;
    border-radius:8px;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#16a34a;
}

.feedback-box{
    margin-top:20px;
}

.item{
    background:#0f172a;
    padding:10px;
    margin:10px 0;
    border-radius:10px;
}

.small{
    font-size:12px;
    color:#aaa;
}
</style>
</head>
<body>

<div class="container">

<h2>⭐ Feedback System</h2>

<input type="text" id="name" placeholder="Your Name">

<div class="stars">
    <span class="star">★</span>
    <span class="star">★</span>
    <span class="star">★</span>
    <span class="star">★</span>
    <span class="star">★</span>
</div>

<textarea id="msg" rows="3" placeholder="Write feedback..."></textarea>

<button onclick="submitFeedback()">Submit</button>

<div class="feedback-box" id="list"></div>

</div>

<script>
let rating = 0;
const stars = document.querySelectorAll(".star");

stars.forEach((star, index) => {
    star.addEventListener("click", () => {
        rating = index + 1;
        updateStars();
    });
});

function updateStars(){
    stars.forEach((star, i) => {
        star.classList.toggle("active", i < rating);
    });
}

function submitFeedback(){
    let name = document.getElementById("name").value;
    let msg = document.getElementById("msg").value;

    if(!name || !msg || rating === 0){
        alert("Please fill all fields!");
        return;
    }

    let data = JSON.parse(localStorage.getItem("feedbacks")) || [];

    data.unshift({
        name,
        msg,
        rating,
        time: new Date().toLocaleString()
    });

    localStorage.setItem("feedbacks", JSON.stringify(data));

    document.getElementById("name").value = "";
    document.getElementById("msg").value = "";
    rating = 0;
    updateStars();

    showFeedback();
}

function showFeedback(){
    let list = document.getElementById("list");
    let data = JSON.parse(localStorage.getItem("feedbacks")) || [];

    list.innerHTML = "";

    data.forEach(item => {
        list.innerHTML += `
        <div class="item">
            <b>${item.name}</b> ⭐ ${item.rating}/5
            <div class="small">${item.time}</div>
            <p>${item.msg}</p>
        </div>
        `;
    });
}

showFeedback();
</script>

</body>
</html>
