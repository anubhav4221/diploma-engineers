<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Feedback System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#000;
    color:white;
    font-family:'Segoe UI';
}

/* NAV */
.navbar{
    background:#000;
    border-bottom:1px solid #333;
}

/* BOX */
.container-box{
    max-width:500px;
    margin:40px auto;
    background:#111;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(255,255,255,0.05);
}

/* INPUT */
input, textarea{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #333;
    background:#000;
    color:white;
    outline:none;
}

/* STARS */
.stars{
    text-align:center;
    margin:10px 0;
}

.star{
    font-size:28px;
    cursor:pointer;
    color:#555;
}

.star.active{
    color:gold;
}

/* BUTTON */
button{
    width:100%;
    padding:10px;
    background:#22c55e;
    border:none;
    border-radius:8px;
    color:white;
    font-weight:bold;
}

button:hover{
    background:#16a34a;
}

/* FEEDBACK LIST */
.feedback-item{
    background:#0f0f0f;
    padding:10px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid #222;
}

.small{
    font-size:12px;
    color:#aaa;
}
</style>

</head>

<body>

<!-- NAV -->
<nav class="navbar p-2">
<a href="index.html" style="color:white;">⬅ Back</a>
</nav>

<div class="container-box">

<h2 class="text-center">⭐ Feedback System</h2>

<input type="text" id="name" placeholder="Your Name">

<div class="stars">
    <span class="star">★</span>
    <span class="star">★</span>
    <span class="star">★</span>
    <span class="star">★</span>
    <span class="star">★</span>
</div>

<textarea id="msg" rows="4" placeholder="Write feedback..."></textarea>

<button onclick="submitFeedback()">Submit</button>

<div id="list"></div>

</div>

<script>
let rating = 0;
const stars = document.querySelectorAll(".star");

stars.forEach((star, index) => {
    star.addEventListener("click", () => {
        rating = index + 1;
        updateStars();
    });
});

function updateStars(){
    stars.forEach((star, i) => {
        star.classList.toggle("active", i < rating);
    });
}

function submitFeedback(){
    let name = document.getElementById("name").value;
    let msg = document.getElementById("msg").value;

    if(!name || !msg || rating === 0){
        alert("Please fill all fields + rating!");
        return;
    }

    let data = JSON.parse(localStorage.getItem("fb")) || [];

    data.unshift({
        name,
        msg,
        rating,
        time: new Date().toLocaleString()
    });

    localStorage.setItem("fb", JSON.stringify(data));

    document.getElementById("name").value = "";
    document.getElementById("msg").value = "";
    rating = 0;
    updateStars();

    showFeedback();
}

function showFeedback(){
    let list = document.getElementById("list");
    let data = JSON.parse(localStorage.getItem("fb")) || [];

    list.innerHTML = "";

    data.forEach(item => {
        list.innerHTML += `
        <div class="feedback-item">
            <b>${item.name}</b> ⭐ ${item.rating}/5
            <div class="small">${item.time}</div>
            <p>${item.msg}</p>
        </div>
        `;
    });
}

showFeedback();
</script>

</body>
</html>
