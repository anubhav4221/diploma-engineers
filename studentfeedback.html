<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Feedback - Diploma Engineers</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#000;
    color:white;
    font-family:'Poppins',sans-serif;
}

/* NAVBAR (Same as Contact Page) */
.navbar{
    background:#0a0a0a;
    border-bottom:1px solid #222;
}

.back-btn{
    color:#22c55e;
    border:1px solid #22c55e;
    padding:5px 15px;
    border-radius:20px;
    text-decoration:none;
    transition:0.3s;
}
.back-btn:hover{
    background:#22c55e;
    color:#000;
}

/* MAIN BOX */
.container-box{
    max-width:520px;
    margin:50px auto;
    background:#111;
    padding:30px;
    border-radius:20px;
    border:1px solid #222;
    box-shadow:0 0 25px rgba(34,197,94,0.1);
    transition:0.3s;
}
.container-box:hover{
    transform:translateY(-5px);
}

/* TITLE */
h2{
    text-align:center;
    color:#22c55e;
    margin-bottom:20px;
}

/* INPUT */
input, textarea{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #333;
    background:#000;
    color:white;
    outline:none;
}
input:focus, textarea:focus{
    border-color:#22c55e;
    box-shadow:0 0 10px rgba(34,197,94,0.3);
}

/* STARS */
.stars{
    text-align:center;
    margin:15px 0;
}
.star{
    font-size:32px;
    cursor:pointer;
    color:#444;
    transition:0.3s;
}
.star:hover{
    transform:scale(1.2);
}
.star.active{
    color:gold;
    text-shadow:0 0 10px gold;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    background:#22c55e;
    border:none;
    border-radius:10px;
    color:black;
    font-weight:600;
    transition:0.3s;
}
button:hover{
    background:#16a34a;
    transform:scale(1.05);
}

/* FEEDBACK LIST */
.feedback-item{
    background:#0f0f0f;
    padding:12px;
    margin-top:12px;
    border-radius:12px;
    border:1px solid #222;
    animation:fadeIn 0.4s ease;
}
@keyframes fadeIn{
    from{opacity:0;transform:translateY(10px);}
    to{opacity:1;transform:translateY(0);}
}

.small{
    font-size:12px;
    color:#aaa;
}

/* EMPTY STATE */
.empty{
    text-align:center;
    color:#666;
    margin-top:15px;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar p-3">
<div class="container d-flex justify-content-between">

<a href="index.html" class="back-btn">⬅ Back</a>
<span class="text-success fw-bold">Diploma Engineers</span>

</div>
</nav>

<!-- MAIN -->
<div class="container-box">

<h2>⭐ Feedback System</h2>

<input type="text" id="name" placeholder="Your Name">

<div class="stars">
    <span class="star">★</span>
    <span class="star">★</span>
    <span class="star">★</span>
    <span class="star">★</span>
    <span class="star">★</span>
</div>

<textarea id="msg" rows="4" placeholder="Write feedback..."></textarea>

<button onclick="submitFeedback()">Submit Feedback</button>

<div id="list"></div>

</div>

<script>
let rating = 0;
const stars = document.querySelectorAll(".star");

stars.forEach((star, index) => {
    star.addEventListener("click", () => {
        rating = index + 1;
        updateStars();
    });
});

function updateStars(){
    stars.forEach((star, i) => {
        star.classList.toggle("active", i < rating);
    });
}

function submitFeedback(){
    let name = document.getElementById("name").value.trim();
    let msg = document.getElementById("msg").value.trim();

    if(!name || !msg || rating === 0){
        alert("⚠ Please fill all fields + rating!");
        return;
    }

    let data = JSON.parse(localStorage.getItem("fb")) || [];

    data.unshift({
        name,
        msg,
        rating,
        time: new Date().toLocaleString()
    });

    localStorage.setItem("fb", JSON.stringify(data));

    document.getElementById("name").value = "";
    document.getElementById("msg").value = "";
    rating = 0;
    updateStars();

    showFeedback();
}

function showFeedback(){
    let list = document.getElementById("list");
    let data = JSON.parse(localStorage.getItem("fb")) || [];

    list.innerHTML = "";

    if(data.length === 0){
        list.innerHTML = `<div class="empty">No feedback yet 😴</div>`;
        return;
    }

    data.forEach(item => {
        list.innerHTML += `
        <div class="feedback-item">
            <b>${item.name}</b> ⭐ ${item.rating}/5
            <div class="small">${item.time}</div>
            <p>${item.msg}</p>
        </div>
        `;
    });
}

showFeedback();
</script>

</body>
</html>

<!-- FOOTER -->
<div id="footer"></div>

<script>
fetch("footer.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("footer").innerHTML = data;
  });
</script>
