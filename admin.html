<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Panel</title>

<style>
body{margin:0;font-family:sans-serif;background:#0f2027;color:white;}
.sidebar{background:#111;padding:15px;}
.sidebar button{width:100%;margin:5px 0;padding:10px;}
.main{padding:15px;}
.card{background:#111;padding:15px;margin:10px 0;border-radius:8px;}
input,textarea{width:100%;padding:10px;margin:5px 0;background:#222;color:white;border:none;}
.post img{width:100%;margin-top:10px;}
</style>
</head>
<body>

<div class="sidebar">
<button onclick="show('add')">Add Post</button>
<button onclick="show('manage')">Manage</button>
</div>

<div class="main">

<div id="add" class="card">
<h3>Add Post</h3>
<input id="title" placeholder="Title">
<textarea id="desc" placeholder="Description"></textarea>
<input type="file" id="img">
<input type="file" id="pdf">
<button onclick="addPost()">Publish</button>
</div>

<div id="manage" class="card" style="display:none;">
<h3>Posts</h3>
<div id="posts"></div>
</div>

</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "PASTE_YOUR_KEY",
  authDomain: "XXXX",
  projectId: "XXXX"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Cloudinary Upload
async function upload(file){
    const fd = new FormData();
    fd.append("file", file);
    fd.append("upload_preset", "mypreset");

    const res = await fetch("https://api.cloudinary.com/v1_1/ddxfmmfko/upload", {
        method:"POST",
        body:fd
    });

    const data = await res.json();
    return data.secure_url || "";
}

// Add Post
window.addPost = async function(){
    const title = document.getElementById("title").value;
    const desc = document.getElementById("desc").value;

    const imgFile = document.getElementById("img").files[0];
    const pdfFile = document.getElementById("pdf").files[0];

    let imgURL = imgFile ? await upload(imgFile) : "";
    let pdfURL = pdfFile ? await upload(pdfFile) : "";

    await addDoc(collection(db, "posts"), {
        title, desc, img: imgURL, pdf: pdfURL,
        date: new Date().toLocaleString()
    });

    alert("Post Added");
    loadPosts();
}

// Load Posts
async function loadPosts(){
    const querySnapshot = await getDocs(collection(db, "posts"));
    let html="";

    querySnapshot.forEach(docSnap=>{
        const p = docSnap.data();
        html+=`
        <div class="post">
            <h3>${p.title}</h3>
            <p>${p.desc}</p>
            ${p.img ? `<img src="${p.img}">` : ""}
            ${p.pdf ? `<a href="${p.pdf}" target="_blank">📄 PDF</a>` : ""}
        </div>`;
    });

    document.getElementById("posts").innerHTML=html;
}

loadPosts();

// Navigation
window.show = function(id){
    document.getElementById("add").style.display="none";
    document.getElementById("manage").style.display="none";
    document.getElementById(id).style.display="block";
}
</script>

</body>
</html>
