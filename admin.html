<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

header{
  background:#111827;
  padding:15px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
}

.container{
  max-width:700px;
  margin:auto;
  padding:20px;
}

.card{
  background:rgba(255,255,255,0.06);
  padding:20px;
  border-radius:12px;
  backdrop-filter:blur(10px);
}

input,textarea,button{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:8px;
}

input,textarea{
  background:#1f2937;
  color:white;
}

button{
  background:#22c55e;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#16a34a;
}
</style>
</head>

<body>

<header>🧑‍💼 Admin Dashboard (WordPress Style)</header>

<div class="container">
<div class="card">

<input type="text" id="title" placeholder="Post Title">
<textarea id="desc" placeholder="Description"></textarea>

<label>Thumbnail Image</label>
<input type="file" id="image">

<label>File (PDF/Image)</label>
<input type="file" id="file">

<button onclick="uploadPost()">Publish Post</button>

<p id="status"></p>

</div>
</div>

<script>
function uploadPost(){

var title=document.getElementById("title").value;
var desc=document.getElementById("desc").value;

var img=document.getElementById("image").files[0];
var file=document.getElementById("file").files[0];

if(!title||!desc||!img||!file){
alert("Fill all fields");
return;
}

var reader1=new FileReader();
var reader2=new FileReader();

reader1.readAsDataURL(img);
reader1.onload=function(){

reader2.readAsDataURL(file);
reader2.onload=function(){

fetch("YOUR_APPS_SCRIPT_URL",{
method:"POST",
body:new URLSearchParams({
title:title,
desc:desc,
image:reader1.result.split(",")[1],
imageType:img.type,
file:reader2.result.split(",")[1],
fileType:file.type
})
})
.then(r=>r.text())
.then(d=>{
document.getElementById("status").innerHTML="✅ Post Published Successfully";
});

}

}

}
</script>

</body>
</html>
