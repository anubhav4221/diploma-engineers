<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI';
    background:#0b1220;
    color:white;
}

/* HEADER */
header{
    background:#111a2e;
    padding:15px;
    text-align:center;
    color:#00d4ff;
    font-weight:bold;
}

/* LAYOUT */
.container{
    display:flex;
    flex-wrap:wrap;
}

/* SIDEBAR */
.sidebar{
    width:220px;
    background:#121a2b;
    min-height:100vh;
    padding:15px;
}

.sidebar button{
    width:100%;
    margin:8px 0;
    padding:10px;
    background:#1e2a44;
    border:none;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

.sidebar button:hover{
    background:#00d4ff;
    color:black;
}

/* MAIN */
.main{
    flex:1;
    padding:15px;
}

.card{
    background:#121a2b;
    padding:15px;
    border-radius:12px;
    margin-bottom:15px;
}

input,textarea{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:none;
    border-radius:8px;
    background:#1e2a44;
    color:white;
}

button.publish{
    background:#00d4ff;
    color:black;
    padding:10px;
    border:none;
    border-radius:8px;
    width:100%;
    cursor:pointer;
}

/* POST */
.post{
    background:#1a243a;
    padding:10px;
    margin:10px 0;
    border-radius:10px;
}

.post img{
    width:100%;
    border-radius:10px;
}

/* MOBILE */
@media(max-width:768px){
    .sidebar{
        width:100%;
        min-height:auto;
    }
}
</style>
</head>
<body>

<header>🔥 Admin Panel</header>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
    <button onclick="show('add')">➕ Add Post</button>
    <button onclick="show('manage')">📄 Manage</button>
</div>

<!-- MAIN -->
<div class="main">

<div id="add" class="card">
<h3>Add New Post</h3>

<input type="text" id="title" placeholder="Title">
<textarea id="desc" placeholder="Description"></textarea>
<input type="file" id="img">

<button class="publish" onclick="addPost()">Publish</button>
</div>

<div id="manage" class="card" style="display:none;">
<h3>All Posts</h3>
<div id="posts"></div>
</div>

</div>
</div>

<script>

function show(id){
    document.getElementById("add").style.display="none";
    document.getElementById("manage").style.display="none";
    document.getElementById(id).style.display="block";
}

// ADD POST
function addPost(){

    let title = document.getElementById("title").value;
    let desc = document.getElementById("desc").value;
    let file = document.getElementById("img").files[0];

    let reader = new FileReader();

    reader.onload = function(){

        let posts = JSON.parse(localStorage.getItem("posts")) || [];

        posts.unshift({
            title,
            desc,
            img: reader.result,
            date: new Date().toLocaleString()
        });

        localStorage.setItem("posts", JSON.stringify(posts));

        loadPosts();

        alert("Post Added");
    }

    if(file){
        reader.readAsDataURL(file);
    }else{
        let posts = JSON.parse(localStorage.getItem("posts")) || [];

        posts.unshift({
            title,
            desc,
            img:"",
            date: new Date().toLocaleString()
        });

        localStorage.setItem("posts", JSON.stringify(posts));

        loadPosts();
    }
}

// LOAD POSTS
function loadPosts(){

    let posts = JSON.parse(localStorage.getItem("posts")) || [];

    let html="";

    posts.forEach((p,i)=>{
        html+=`
        <div class="post">
            <h3>${p.title}</h3>
            <p>${p.desc}</p>
            ${p.img ? `<img src="${p.img}">` : ""}
            <small>${p.date}</small>
            <br><button onclick="del(${i})">Delete</button>
        </div>`;
    });

    document.getElementById("posts").innerHTML = html;
}

// DELETE
function del(i){
    let posts = JSON.parse(localStorage.getItem("posts")) || [];
    posts.splice(i,1);
    localStorage.setItem("posts", JSON.stringify(posts));
    loadPosts();
}

loadPosts();

</script>

</body>
</html>
