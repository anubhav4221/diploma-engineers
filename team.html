.team-section {

.team-card {
    background: #fff;
    border-radius: 20px;
    max-width: 280px;
    margin: auto;
    transition: 0.3s;
}

.team-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

/* Image */
.team-img {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #0d6efd;
    margin-bottom: 10px;
}

/* Icons */
.social-icons a {
    margin: 0 8px;
    color: #555;
    font-size: 18px;
    transition: 0.3s;
}

.social-icons a:hover {
    color: #0d6efd;
}

/* Hide arrows */
.carousel-control-prev,
.carousel-control-next {
    display: none;
}
