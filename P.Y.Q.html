<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PYQ Search</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Poppins',sans-serif;
    background:#eef2f7;
    margin:0;
}

/* Header */
.header{
    background:#4e73df;
    color:white;
    padding:15px;
    text-align:center;
    position:relative;
}

.back-btn{
    position:absolute;
    left:15px;
    top:15px;
    background:white;
    color:#4e73df;
    padding:6px 12px;
    border-radius:6px;
    text-decoration:none;
}

/* Container */
.container{
    max-width:900px;
    margin:20px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* Search */
.search-box{
    width:100%;
    padding:10px;
    border-radius:6px;
    border:1px solid #ccc;
    margin-bottom:20px;
}

/* Table */
table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#4e73df;
    color:white;
    padding:10px;
}

td{
    padding:10px;
    border-bottom:1px solid #ddd;
}

tr:hover{
    background:#f1f5ff;
}

/* Button */
.download-btn{
    background:#1cc88a;
    color:white;
    padding:6px 12px;
    border-radius:6px;
    text-decoration:none;
}

/* Pagination */
.pagination{
    text-align:center;
    margin-top:20px;
}

.pagination button{
    margin:3px;
    padding:6px 12px;
    border:none;
    background:#ddd;
    cursor:pointer;
    border-radius:5px;
}

.pagination button.active{
    background:#4e73df;
    color:white;
}
</style>
</head>

<body>

<div class="header">
    <a href="index.html" class="back-btn">⬅ Back</a>
    <h2>PYQ Search</h2>
</div>

<div class="container">

    <!-- Search -->
    <input type="text" id="search" class="search-box" placeholder="Search Subject...">

    <!-- Table -->
    <table>
        <thead>
            <tr>
                <th>Subject Name</th>
                <th>Download</th>
            </tr>
        </thead>
        <tbody id="tableData"></tbody>
    </table>

    <!-- Pagination -->
    <div class="pagination" id="pagination"></div>

</div>

<script>
const data = [
"Engineering Mathematics",
"Applied Physics",
"Applied Chemistry",
"Computer Programming",
"Workshop Practice",
"Thermal Engineering",
"Fluid Mechanics",
"Strength of Material",
"Machine Design",
"Surveying",
"Data Structure",
"Operating System",
"DBMS",
"Java Programming",
"Web Development",
"Electrical Machine",
"Digital Electronics",
"Control System",
"Microprocessor",
"Power System"
];

// Convert to object
const fullData = data.map(s => ({subject:s, link:"#"}));

let currentPage = 1;
const rowsPerPage = 5;
let filteredData = fullData;

function displayTable(){
    let start = (currentPage-1)*rowsPerPage;
    let end = start + rowsPerPage;
    let pageData = filteredData.slice(start,end);

    let html = "";
    pageData.forEach(item=>{
        html += `
        <tr>
            <td>${item.subject}</td>
            <td><a href="${item.link}" class="download-btn">Download</a></td>
        </tr>`;
    });

    document.getElementById("tableData").innerHTML = html;
    setupPagination();
}

function setupPagination(){
    let pageCount = Math.ceil(filteredData.length/rowsPerPage);
    let buttons = "";

    for(let i=1;i<=pageCount;i++){
        buttons += `<button onclick="changePage(${i})" class="${i===currentPage?'active':''}">${i}</button>`;
    }

    document.getElementById("pagination").innerHTML = buttons;
}

function changePage(page){
    currentPage = page;
    displayTable();
}

// Search
document.getElementById("search").addEventListener("keyup", function(){
    let value = this.value.toLowerCase();

    filteredData = fullData.filter(item =>
        item.subject.toLowerCase().includes(value)
    );

    currentPage = 1;
    displayTable();
});

// Init
displayTable();
</script>

</body>
</html>
