<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Latest News</title>

<style>
body{
    background:#0f2027;
    color:white;
    font-family:sans-serif;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
}

.post{
    background:#111;
    padding:15px;
    border-radius:10px;
}

.post img{
    width:100%;
    border-radius:8px;
    margin-top:10px;
}

.post h2{color:#00d4ff;}
.post small{color:#aaa;}
</style>
</head>
<body>

<h1>🔥 Latest News</h1>

<div class="container" id="news"></div>

<script>

function loadNews(){
    let posts = JSON.parse(localStorage.getItem("posts")) || [];

    let html = "";

    if(posts.length === 0){
        html = "<p>No news available</p>";
    }

    posts.forEach(p=>{
        html += `
        <div class="post">
            <h2>${p.title}</h2>
            <p>${p.desc}</p>
            ${p.img ? `<img src="${p.img}">` : ""}
            <small>${p.date}</small>
        </div>
        `;
    });

    document.getElementById("news").innerHTML = html;
}

loadNews();

</script>

</body>
</html>
