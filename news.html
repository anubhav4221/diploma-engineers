<!DOCTYPE html>
<html>
<head>
<title>Latest News</title>
<style>
body{background:#0f2027;color:white;font-family:sans-serif;padding:20px;}
.post{
    background:#111;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
}
.post img{
    width:100%;
    border-radius:8px;
}
</style>
</head>
<body>

<h1>🔥 Latest News</h1>

<div id="news"></div>

<script>
function loadNews(){
    let posts = JSON.parse(localStorage.getItem("posts")) || [];

    let html = "";

    posts.forEach(p=>{
        html += `
        <div class="post">
            <h2>${p.title}</h2>
            <p>${p.desc}</p>
            ${p.image ? `<img src="${p.image}">` : ""}
            <small>${p.date}</small>
        </div>
        `;
    });

    document.getElementById("news").innerHTML = html;
}

loadNews();
</script>

</body>
</html>
