<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ebook Store</title>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#0f172a;color:white;}

.header{
    background:#22c55e;
    padding:15px;
    display:flex;
    justify-content:space-between;
}

.search{
    padding:8px;
    border-radius:6px;
    border:none;
}

.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:#1e293b;
    padding:10px;
    border-radius:10px;
    text-align:center;
}

.card img{
    width:100%;
    height:160px;
    object-fit:cover;
}

.price{color:#22c55e;}

button{
    background:#22c55e;
    border:none;
    padding:10px;
    width:100%;
    color:white;
    cursor:pointer;
}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
}

.box{
    background:#1e293b;
    padding:20px;
    width:300px;
    border-radius:10px;
    position:relative;
}

.close{
    position:absolute;
    right:10px;
    top:5px;
    cursor:pointer;
}

input,textarea{
    width:100%;
    padding:8px;
    margin:5px 0;
    border:none;
    border-radius:5px;
}
</style>
</head>

<body>

<div class="header">
    <div>📚 Ebook Store</div>
    <input class="search" id="searchInput" placeholder="Search books...">
</div>

<div class="container" id="bookContainer">

<!-- 6 BOOKS -->
<script>
const books = [
"Engineering Maths",
"Physics Notes",
"Computer Basics",
"Engineering Maths-II",
"Chemistry Notes",
"Drawing / BOM Notes"
];

document.write(books.map(b => `
<div class="card">
<img src="https://images.unsplash.com/photo-1589820296156-2454bb8a6ad1">
<h3>${b}</h3>
<p class="price">₹99</p>
<button onclick="openForm('${b}')">Buy</button>
</div>
`).join(""));
</script>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="box">

<span class="close" onclick="closeForm()">✖</span>

<h3>Order Form</h3>

<p>Scan & Pay ₹99</p>
<img src="https://anubhav.finance.blog/wp-content/uploads/2026/03/whatsapp-image-2026-03-09-at-10.49.05.jpeg?w=592" width="140">

<input id="upi" placeholder="UPI Transaction ID">
<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<input id="phone" placeholder="Phone">
<input id="book">
<textarea id="address" placeholder="Address"></textarea>

<button onclick="sendOrder()">Place Order</button>

</div>
</div>

<script>

// INIT EMAILJS
emailjs.init("YOUR_PUBLIC_KEY");

// SEARCH
document.getElementById("searchInput").addEventListener("keyup", function(){
    let input = this.value.toLowerCase();
    document.querySelectorAll(".card").forEach(card=>{
        let title = card.querySelector("h3").innerText.toLowerCase();
        card.style.display = title.includes(input) ? "block" : "none";
    });
});

// OPEN FORM
function openForm(book){
    document.getElementById("book").value = book;
    document.getElementById("modal").style.display = "flex";
}

// CLOSE FORM
function closeForm(){
    document.getElementById("modal").style.display = "none";
}

// CLICK OUTSIDE CLOSE
window.onclick = function(e){
    let modal = document.getElementById("modal");
    if(e.target === modal){
        modal.style.display = "none";
    }
}

// SEND ORDER
function sendOrder(){

    let data = {
        to_email: "Astar22072006@gmail.com",

        upi: document.getElementById("upi").value,
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        phone: document.getElementById("phone").value,
        book: document.getElementById("book").value,
        address: document.getElementById("address").value
    };

    if(!data.upi || !data.name || !data.email){
        alert("⚠️ Fill required fields");
        return;
    }

    emailjs.send("YOUR_SERVICE_ID","YOUR_TEMPLATE_ID",data)
    .then(()=>{
        alert("✅ Order Successful! Book will be sent within 24 hours.");
        closeForm();
    })
    .catch((err)=>{
        alert("❌ Email failed");
        console.log(err);
    });
}

</script>

</body>
</html>
