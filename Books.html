<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ebook Store</title>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
body{
    font-family:Arial;
    background:#0f172a;
    color:white;
    margin:0;
}

/* HEADER */
.header{
    text-align:center;
    padding:20px;
    background:#020617;
    font-size:24px;
    font-weight:bold;
}

/* GRID */
.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

/* CARD */
.card{
    background:#1e293b;
    padding:15px;
    border-radius:15px;
    text-align:center;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:10px;
}

.card h3{
    margin:10px 0;
}

.price{
    color:#22c55e;
    font-size:18px;
    margin-bottom:10px;
}

button{
    background:#22c55e;
    border:none;
    padding:10px;
    border-radius:8px;
    color:white;
    width:100%;
    cursor:pointer;
    font-size:15px;
}

button:hover{
    background:#16a34a;
}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    justify-content:center;
    align-items:center;
}

.modal-box{
    background:#1e293b;
    padding:20px;
    border-radius:10px;
    width:300px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:6px;
    border:none;
}
</style>

</head>
<body>

<div class="header">📚 Ebook Store</div>

<div class="container">

<!-- BOOK 1 -->
<div class="card">
<img src="https://images.unsplash.com/photo-1589820296156-2454bb8a6ad1">
<h3>Engineering Maths</h3>
<p class="price">₹99</p>
<button onclick="openForm()">Buy Now</button>
</div>

<!-- BOOK 2 -->
<div class="card">
<img src="https://images.unsplash.com/photo-1589820296156-2454bb8a6ad1">
<h3>Physics Notes</h3>
<p class="price">₹99</p>
<button onclick="openForm()">Buy Now</button>
</div>

<!-- BOOK 3 -->
<div class="card">
<img src="https://images.unsplash.com/photo-1589820296156-2454bb8a6ad1">
<h3>Computer Basics</h3>
<p class="price">₹99</p>
<button onclick="openForm()">Buy Now</button>
</div>

<!-- BOOK 4 -->
<div class="card">
<img src="https://images.unsplash.com/photo-1589820296156-2454bb8a6ad1">
<h3>Electrical Notes</h3>
<p class="price">₹99</p>
<button onclick="openForm()">Buy Now</button>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-box">

<h3>Enter Details</h3>

<input type="text" id="name" placeholder="Name">
<input type="email" id="email" placeholder="Email">
<input type="tel" id="mobile" placeholder="Mobile Number">

<button onclick="payNow()">Proceed Payment</button>

</div>
</div>

<script>

function openForm(){
    document.getElementById("modal").style.display = "flex";
}

async function payNow(){

    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let mobile = document.getElementById("mobile").value;

    if(!name || !email || !mobile){
        alert("Fill all fields");
        return;
    }

    let res = await fetch("/create-order", {method:"POST"});
    let data = await res.json();

    var options = {
        "key": "YOUR_KEY_ID",
        "amount": data.amount,
        "currency": "INR",
        "name": "Ebook Store",
        "description": "Book Purchase",
        "order_id": data.id,

        "handler": function (response){

            alert("Payment Successful ✅");

            // 👉 YOUR GOOGLE DRIVE FILE OPEN
            window.location.href = "https://drive.google.com/file/d/1Rf0MKJ4Z-zbaC5qr8mdVMrOL9TAelDdH/view?usp=drivesdk";
        },

        "prefill": {
            "name": name,
            "email": email,
            "contact": mobile
        },

        "theme": {
            "color": "#22c55e"
        }
    };

    var rzp = new Razorpay(options);
    rzp.open();
}

</script>

</body>
</html>
