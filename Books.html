<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Premium Ebook Store</title>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
body{margin:0;font-family:'Segoe UI',sans-serif;background:#0f172a;color:white;}

.header{
    background:linear-gradient(90deg,#0ea5e9,#22c55e);
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.search{padding:8px;border-radius:8px;border:none;width:200px;}

.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

.card{background:#1e293b;border-radius:15px;overflow:hidden;}
.card img{width:100%;height:180px;object-fit:cover;}
.card-body{text-align:center;padding:15px;}
.price{color:#22c55e;}

button{
    background:#22c55e;
    border:none;
    padding:10px;
    border-radius:8px;
    color:white;
    width:100%;
    cursor:pointer;
}

.modal{
    display:none;
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
}

.modal-box{
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    width:350px;
    position:relative;
}

.close-btn{
    position:absolute;
    right:10px;
    top:5px;
    cursor:pointer;
}

input,textarea{
    width:100%;
    padding:10px;
    margin:6px 0;
    border:none;
    border-radius:6px;
}
</style>
</head>

<body>

<div class="header">
    <div>📚 Ebook Store</div>
    <input class="search" id="searchInput" onkeyup="searchBooks()" placeholder="Search books...">
</div>

<div class="container">

<div class="card">
<img src="https://images.unsplash.com/photo-1589820296156-2454bb8a6ad1">
<div class="card-body">
<h3>Engineering Maths</h3>
<p class="price">₹99</p>
<button onclick="openForm('Engineering Maths')">Buy Now</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1589820296156-2454bb8a6ad1">
<div class="card-body">
<h3>Physics Notes</h3>
<p class="price">₹99</p>
<button onclick="openForm('Physics Notes')">Buy Now</button>
</div>
</div>

 <div class="card">
<img src="https://images.unsplash.com/photo-1589820296156-2454bb8a6ad1">
<div class="card-body">
<h3>Physics Notes</h3>
<p class="price">₹99</p>
<button onclick="openForm('Physics Notes')">Buy Now</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1589820296156-2454bb8a6ad1">
<div class="card-body">
<h3>Physics Notes</h3>
<p class="price">₹99</p>
<button onclick="openForm('Physics Notes')">Buy Now</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1589820296156-2454bb8a6ad1">
<div class="card-body">
<h3>Physics Notes</h3>
<p class="price">₹99</p>
<button onclick="openForm('Physics Notes')">Buy Now</button>
</div>
</div>
  
<div class="card">
<img src="https://images.unsplash.com/photo-1589820296156-2454bb8a6ad1">
<div class="card-body">
<h3>Physics Notes</h3>
<p class="price">₹99</p>
<button onclick="openForm('Physics Notes')">Buy Now</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1589820296156-2454bb8a6ad1">
<div class="card-body">
<h3>Physics Notes</h3>
<p class="price">₹99</p>
<button onclick="openForm('Physics Notes')">Buy Now</button>
</div>
</div>

</div>
  

  
<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-box">

<span class="close-btn" onclick="closeForm()">✖</span>

<h3>🧾 Order Form</h3>

<p>📲 Scan & Pay ₹99</p>
<img src="https://anubhav.finance.blog/wp-content/uploads/2026/03/whatsapp-image-2026-03-09-at-10.49.05.jpeg?w=592" width="150">

<input id="upi" placeholder="UPI Transaction ID">
<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<input id="phone1" placeholder="Phone">
<input id="book">
<textarea id="address" placeholder="Address"></textarea>
<input id="pincode" placeholder="Pincode">

<button onclick="sendOrder()">Place Order</button>

</div>
</div>

<script>

// ✅ INIT EMAILJS (1 बार)
emailjs.init("YOUR_PUBLIC_KEY");

// 🔍 SEARCH
function searchBooks(){
    let input = document.getElementById("searchInput").value.toLowerCase();
    document.querySelectorAll(".card").forEach(card=>{
        let title = card.querySelector("h3").innerText.toLowerCase();
        card.style.display = title.includes(input) ? "block" : "none";
    });
}

// OPEN FORM
function openForm(book){
    document.getElementById("book").value = book;
    document.getElementById("modal").style.display="flex";
}

// CLOSE FORM
function closeForm(){
    document.getElementById("modal").style.display="none";
}

// SEND EMAIL
function sendOrder(){

    let data = {
        to_email: "Astar22072006@gmail.com",

        upi: document.getElementById("upi").value,
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        phone1: document.getElementById("phone1").value,
        book: document.getElementById("book").value,
        address: document.getElementById("address").value,
        pincode: document.getElementById("pincode").value
    };

    if(!data.upi || !data.name || !data.email){
        alert("⚠️ Fill required fields");
        return;
    }

    emailjs.send("YOUR_SERVICE_ID","YOUR_TEMPLATE_ID",data)
    .then(()=>{
        alert("✅ Order Successful! Your order is under process. Within 24 hours we will send your book on email.");
        closeForm();
    })
    .catch((err)=>{
        alert("❌ Error: " + JSON.stringify(err));
    });
}

</script>

</body>
</html>
