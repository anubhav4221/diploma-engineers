.header{

.container{
    display:grid;

}

.card{
    background:#1e293b;
    border-radius:15px;
    overflow:hidden;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-8px);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.card-body{
    padding:15px;
    text-align:center;
}

.price{
    color:#22c55e;
}

/* BUTTON */
button{
    background:#22c55e;
    border:none;
    padding:10px;
    border-radius:8px;
    color:white;
    width:100%;
    cursor:pointer;
}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
}

.modal-box{
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    width:350px;
    max-height:90vh;
    overflow:auto;
    position:relative;
}

/* CLOSE BUTTON */
.close-btn{
    position:absolute;
    top:10px;
    right:15px;
    font-size:20px;
    cursor:pointer;
}
.close-btn:hover{
    color:red;
}

input, textarea{
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:6px;
    border:none;
}
</style>

</head>

<script>

let selectedBook="";

function openForm(book){
    selectedBook = book;
    document.getElementById("book").value = book;
    document.getElementById("modal").style.display="flex";
}

function closeForm(){
    document.getElementById("modal").style.display="none";
}

window.onclick = function(e){
    let modal = document.getElementById("modal");
    if(e.target === modal){
        modal.style.display="none";
    }
}

async function submitOrder(){

    let data = {
        upi: document.getElementById("upi").value,
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        phone1: document.getElementById("phone1").value,
        phone2: document.getElementById("phone2").value,
        book: document.getElementById("book").value,
        message: document.getElementById("message").value,
        address: document.getElementById("address").value,
        pincode: document.getElementById("pincode").value
    };

    if(!data.upi || !data.name || !data.email || !data.phone1 || !data.address || !data.pincode){
        alert("⚠️ Please fill all required fields");
        return;
    }

    try{
        let res = await fetch("http://localhost:5000/order",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify(data)
        });

        let result = await res.json();

        if(result.status === "ok"){
            alert("✅ Your order is under process. Within 24 hours we will send your book on email.");
            closeForm();
        }else{
            alert("❌ Failed to send order");
        }

    }catch(err){
        alert("⚠️ Server not running");
    }
}

</script>
