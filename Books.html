<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Premium Ebook Store</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:#0f172a;
    color:white;
}

/* HEADER */
.header{
    background:linear-gradient(90deg,#0ea5e9,#22c55e);
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:20px;
    font-weight:bold;
}

.search{
    padding:8px;
    border-radius:8px;
    border:none;
    width:200px;
}

/* GRID */
.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

/* CARD */
.card{
    background:#1e293b;
    border-radius:15px;
    overflow:hidden;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-8px);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.card-body{
    padding:15px;
    text-align:center;
}

.price{
    color:#22c55e;
}

button{
    background:#22c55e;
    border:none;
    padding:10px;
    border-radius:8px;
    color:white;
    width:100%;
    cursor:pointer;
}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
}

.modal-box{
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    width:350px;
    max-height:90vh;
    overflow:auto;
    position:relative;
}

.close-btn{
    position:absolute;
    top:10px;
    right:15px;
    cursor:pointer;
}

input, textarea{
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:6px;
    border:none;
}
</style>

</head>
<body>

<!-- HEADER WITH SEARCH -->
<div class="header">
    <div class="logo">📚 Ebook Store</div>
    <input class="search" id="searchInput" onkeyup="searchBooks()" placeholder="Search books...">
</div>

<!-- BOOK GRID -->
<div class="container" id="bookContainer">

<div class="card">
<img src="https://images.unsplash.com/photo-1589820296156-2454bb8a6ad1">
<div class="card-body">
<h3>Engineering Maths</h3>
<p class="price">₹99</p>
<button onclick="openForm('Engineering Maths')">Buy Now</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1589820296156-2454bb8a6ad1">
<div class="card-body">
<h3>Physics Notes</h3>
<p class="price">₹99</p>
<button onclick="openForm('Physics Notes')">Buy Now</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1589820296156-2454bb8a6ad1">
<div class="card-body">
<h3>Computer Basics</h3>
<p class="price">₹99</p>
<button onclick="openForm('Computer Basics')">Buy Now</button>
</div>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-box">

<span class="close-btn" onclick="closeForm()">✖</span>

<h3>🧾 Order Form</h3>

<div style="text-align:center;">
<p>📲 Scan & Pay ₹99</p>
<img src="https://anubhav.finance.blog/wp-content/uploads/2026/03/whatsapp-image-2026-03-09-at-10.49.05.jpeg?w=592" width="200">
</div>

<input id="upi" placeholder="UPI Transaction ID">
<input id="name" placeholder="Name">
<input id="email" placeholder="Email">

<input id="phone1" placeholder="Phone-1">
<input id="phone2" placeholder="Phone-2">

<input id="book">

<textarea id="message" placeholder="Message"></textarea>
<textarea id="address" placeholder="Address"></textarea>
<input id="pincode" placeholder="Pincode">

<button onclick="submitOrder()">Place Order</button>

</div>
</div>

<script>

// SEARCH FUNCTION
function searchBooks(){
    let input = document.getElementById("searchInput").value.toLowerCase();
    let cards = document.querySelectorAll(".card");

    cards.forEach(card=>{
        let title = card.querySelector("h3").innerText.toLowerCase();
        if(title.includes(input)){
            card.style.display="block";
        }else{
            card.style.display="none";
        }
    });
}

let selectedBook="";

function openForm(book){
    selectedBook = book;
    document.getElementById("book").value = book;
    document.getElementById("modal").style.display="flex";
}

function closeForm(){
    document.getElementById("modal").style.display="none";
}

window.onclick = function(e){
    let modal = document.getElementById("modal");
    if(e.target === modal){
        modal.style.display="none";
    }
}

// YOUR EXISTING EMAIL SYSTEM
async function submitOrder(){

    let data = {
        upi: document.getElementById("upi").value,
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        phone1: document.getElementById("phone1").value,
        phone2: document.getElementById("phone2").value,
        book: document.getElementById("book").value,
        message: document.getElementById("message").value,
        address: document.getElementById("address").value,
        pincode: document.getElementById("pincode").value
    };

    if(!data.upi || !data.name || !data.email || !data.phone1 || !data.address || !data.pincode){
        alert("⚠️ Please fill all required fields");
        return;
    }

    try{
        let res = await fetch("http://localhost:5000/order",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify(data)
        });

        let result = await res.json();

        if(result.status === "ok"){
            alert("✅ Your order is under process. Within 24 hours we will send your book on email.");
            closeForm();
        }else{
            alert("❌ Failed to send order");
        }

    }catch(err){
        alert("⚠️ Server not running");
    }
}

</script>

</body>
</html>
