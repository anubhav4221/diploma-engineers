<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Engineering Book Store</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#000;
    color:white;
    font-family:'Segoe UI';
}

/* NAVBAR */
.navbar{
    background:#000;
    border-bottom:1px solid #333;
}

/* TITLE */
h1{
    text-align:center;
    margin-top:20px;
}

/* BOOK CARD */
.book-card{
    background:#111;
    border-radius:15px;
    padding:15px;
    margin:15px 0;
    text-align:center;
    transition:0.3s;
    border:1px solid #222;
}

.book-card:hover{
    transform:scale(1.05);
    background:#1a1a1a;
}

/* IMAGE */
.book-card img{
    width:100%;
    height:220px;
    object-fit:cover;
    border-radius:10px;
}

/* BUTTON */
button{
    width:100%;
    padding:10px;
    margin-top:10px;
    background:#22c55e;
    border:none;
    border-radius:8px;
    color:white;
    font-weight:bold;
}

button:hover{
    background:#16a34a;
}

/* PRICE */
.price{
    color:#facc15;
    font-weight:bold;
    margin-top:5px;
}
</style>

</head>

<body>

<!-- NAV -->
<nav class="navbar p-2">
<a href="index.html" style="color:white;">⬅ Back to Home</a>
</nav>

<h1>📚 Engineering Book Store</h1>
<p class="text-center text-secondary">All Branch Books Available</p>

<div class="container">
<div class="row">

<!-- BOOK 1 -->
<div class="col-md-4">
<div class="book-card">
    <img src="https://images.unsplash.com/photo-1524995997946-a1c2e315a42f" alt="">
    <h5>Engineering Mathematics</h5>
    <div class="price">₹299</div>
    <button>Buy Now</button>
</div>
</div>

<!-- BOOK 2 -->
<div class="col-md-4">
<div class="book-card">
    <img src="https://images.unsplash.com/photo-1581091870622-3f8d2f5a6c7a" alt="">
    <h5>Mechanical Engineering Basics</h5>
    <div class="price">₹349</div>
    <button>Buy Now</button>
</div>
</div>

<!-- BOOK 3 -->
<div class="col-md-4">
<div class="book-card">
    <img src="https://images.unsplash.com/photo-1589820296156-2454bb8a6ad1" alt="">
    <h5>Electrical Engineering Guide</h5>
    <div class="price">₹399</div>
    <button>Buy Now</button>
</div>
</div>

<!-- BOOK 4 -->
<div class="col-md-4">
<div class="book-card">
    <img src="https://images.unsplash.com/photo-1518770660439-4636190af475" alt="">
    <h5>Computer Science Handbook</h5>
    <div class="price">₹299</div>
    <button>Buy Now</button>
</div>
</div>

<!-- BOOK 5 -->
<div class="col-md-4">
<div class="book-card">
    <img src="https://images.unsplash.com/photo-1526378722484-cc31f5f3c5f1" alt="">
    <h5>Electronics Engineering</h5>
    <div class="price">₹329</div>
    <button>Buy Now</button>
</div>
</div>

<!-- BOOK 6 -->
<div class="col-md-4">
<div class="book-card">
    <img src="https://images.unsplash.com/photo-1507842217343-583bb7270b66" alt="">
    <h5>Civil Engineering Guide</h5>
    <div class="price">₹379</div>
    <button>Buy Now</button>
</div>
</div>

</div>
</div>

</body>
</html>
