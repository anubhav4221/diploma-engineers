<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact Form</title>
<style>
body{
    font-family: Arial;
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.form-box{
    background:#1e293b;
    padding:25px;
    border-radius:15px;
    width:320px;
    color:white;
    box-shadow:0 0 15px rgba(0,0,0,0.4);
}

.form-box h2{
    text-align:center;
    margin-bottom:15px;
}

input, textarea{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:none;
    border-radius:8px;
    outline:none;
}

button{
    width:100%;
    padding:10px;
    background:#22c55e;
    border:none;
    border-radius:8px;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#16a34a;
}
</style>
</head>
<body>

<div class="form-box">
    <h2>Contact Us</h2>

    <form action="mailto:astar22072006@gmail.com" method="post" enctype="text/plain">

        <input type="text" name="name" placeholder="Your Name" required>

        <input type="email" name="email" placeholder="Your Email" required>

        <textarea name="message" rows="5" placeholder="Your Message" required></textarea>

        <button type="submit">Send Message</button>

    </form>
</div>

</body>
</html>
