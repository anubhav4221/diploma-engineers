<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diploma Engineers</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body{
    margin:0;
    font-family:Arial;
}
section, header, footer{
    width:100%;
}
</style>
</head>

<body>

<!-- HEADER (direct include or fetch) -->
<div id="header"></div>

<!-- VISION -->
<section id="vision"></section>

<!-- ACHIEVEMENTS -->
<section id="achievements"></section>

<!-- BRANCH -->
<section id="branch"></section>

<!-- TEAM -->
<section id="team"></section>

<!-- FEEDBACK -->
<section id="feedback"></section>

<!-- FOOTER -->
<footer id="footer"></footer>


<script>
// LOAD ALL SECTIONS PROPERLY

fetch("header.html").then(r=>r.text()).then(d=>{
    document.getElementById("header").innerHTML = d;
});

fetch("vision.html").then(r=>r.text()).then(d=>{
    document.getElementById("vision").innerHTML = d;
});

fetch("achievements.html").then(r=>r.text()).then(d=>{
    document.getElementById("achievements").innerHTML = d;
});

fetch("branch.html").then(r=>r.text()).then(d=>{
    document.getElementById("branch").innerHTML = d;
});

fetch("team.html").then(r=>r.text()).then(d=>{
    document.getElementById("team").innerHTML = d;
});

fetch("feedback.html").then(r=>r.text()).then(d=>{
    document.getElementById("feedback").innerHTML = d;
});

fetch("footer.html").then(r=>r.text()).then(d=>{
    document.getElementById("footer").innerHTML = d;
});
</script>

</body>
</html>
