<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complete Website</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    margin:0;
    padding:0;
    font-family: Arial, sans-serif;
}

/* FULL WIDTH FIX */
section, header, footer{
    width:100%;
}
</style>
</head>

<body>

<!-- HEADER -->
<div id="header"></div>

<!-- VISION -->
<section id="vision"></section>

<!-- ACHIEVEMENTS -->
<section id="achievements"></section>

<!-- BRANCH -->
<section id="branch"></section>

<!-- STUDENT FEEDBACK -->
<section id="studentfeedback"></section>

<!-- TEAM -->
<section id="team"></section>

<!-- FOOTER -->
<footer id="footer"></footer>


<script>
// LOAD HEADER
fetch("header.html")
.then(res => res.text())
.then(data => {
    document.getElementById("header").innerHTML = data;
});

// LOAD VISION
fetch("vision.html")
.then(res => res.text())
.then(data => {
    document.getElementById("vision").innerHTML = data;
});

// LOAD ACHIEVEMENTS
fetch("achievements.html")
.then(res => res.text())
.then(data => {
    document.getElementById("achievements").innerHTML = data;
});

// LOAD BRANCH
fetch("branch.html")
.then(res => res.text())
.then(data => {
    document.getElementById("branch").innerHTML = data;
});

// LOAD STUDENT FEEDBACK
fetch("studentfeedback.html")
.then(res => res.text())
.then(data => {
    document.getElementById("studentfeedback").innerHTML = data;
});

// LOAD TEAM
fetch("team.html")
.then(res => res.text())
.then(data => {
    document.getElementById("team").innerHTML = data;
});

// LOAD FOOTER
fetch("footer.html")
.then(res => res.text())
.then(data => {
    document.getElementById("footer").innerHTML = data;
});
</script>

</body>
</html>
