<!DOCTYPE html>

<style>
body{
  margin:0;
  font-family:Arial;
}

/* HEADER */
header{
  background:#1d3557;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:sticky;
  top:0;
  z-index:9999;
}

/* LOGO TEXT */
.logo{
  font-size:22px;
  font-weight:900;
}

.logo .white{
  color:white;
}

.logo .yellow{
  color:yellow;
}

/* MENU ICON */
#menuBtn{
  font-size:28px;
  cursor:pointer;
}

/* OVERLAY */
#overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  opacity:0;
  visibility:hidden;
  transition:0.3s;
  z-index:9998;
}

/* SIDE MENU */
#sideMenu{
  position:fixed;
  top:0;
  right:-270px;
  width:260px;
  height:100%;
  background:#1d3557;
  transition:0.3s;
  padding-top:60px;
  z-index:99999;
}

/* LINKS */
#sideMenu a{
  display:block;
  padding:15px;
  color:white;
  text-decoration:none;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

/* CLOSE BUTTON */
#closeBtn{
  position:absolute;
  top:10px;
  right:15px;
  font-size:22px;
  cursor:pointer;
  color:white;
}

/* ACTIVE STATE */
#sideMenu.active{
  right:0;
}

#overlay.active{
  opacity:1;
  visibility:visible;
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <span class="white">Diploma</span>
    <span class="yellow">Engineers</span>
  </div>

  <div id="menuBtn"><i class="fa fa-bars"></i></div>
</header>

<!-- OVERLAY -->
<div id="overlay"></div>

<!-- SIDE MENU -->
<div id="sideMenu">
  <div id="closeBtn"><i class="fa fa-times"></i></div>

  <a href="index.html">Home</a>
  <a href="vision.html">Vision</a>
  <a href="achievements.html">Achievements</a>
  <a href="branch.html">Branch</a>
  <a href="studentfeedback.html">Student Feedback</a>
  <a href="team.html">Team</a>
</div>

<script>
const menuBtn = document.getElementById("menuBtn");
const sideMenu = document.getElementById("sideMenu");
const overlay = document.getElementById("overlay");
const closeBtn = document.getElementById("closeBtn");
const links = document.querySelectorAll("#sideMenu a");

// open menu
menuBtn.onclick = () => {
  sideMenu.classList.add("active");
  overlay.classList.add("active");
};

// close menu
function closeMenu(){
  sideMenu.classList.remove("active");
  overlay.classList.remove("active");
}

closeBtn.onclick = closeMenu;
overlay.onclick = closeMenu;

// close on link click
links.forEach(link => {
  link.onclick = closeMenu;
});
</script>

</body>
</html>

<script>
// ===== SMART COUNTER (RUN ONLY WHEN VISIBLE) =====
const counters = document.querySelectorAll(".counter");

const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if(entry.isIntersecting){
            const counter = entry.target;
            const target = +counter.dataset.target;

            let count = 0;
            const step = target / 100;

            const update = () => {
                count += step;
                if(count < target){
                    counter.innerText = Math.ceil(count);
                    setTimeout(update, 20);
                } else {
                    counter.innerText = target;
                }
            };

            update();
            observer.unobserve(counter);
        }
    });
}, { threshold: 0.6 });

counters.forEach(c => observer.observe(c));
</script>
