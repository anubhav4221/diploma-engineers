<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diploma Website</title>
</head>

<body>

<!-- HEADER -->
<div id="header"></div>

<!-- SECTIONS -->
<div id="vision"></div>
<div id="achievements"></div>
<div id="branch"></div>
<div id="team"></div>
<div id="student-feedback"></div>

<!-- FOOTER -->
<div id="footer"></div>

<script>
// LOAD HEADER
fetch("header.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("header").innerHTML = data;
  });

<div class="container">
  <div id="vision"></div>
</div>


// LOAD BRANCH
fetch("branch.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("branch").innerHTML = data;
  });

// LOAD TEAM
fetch("team.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("team").innerHTML = data;
  });

// LOAD FEEDBACK
fetch("studentfeedback.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("student-feedback").innerHTML = data;
  });

// LOAD FOOTER
fetch("footer.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("footer").innerHTML = data;
  });

</script>

</body>
</html>
