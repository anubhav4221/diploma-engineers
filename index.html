<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diploma Engineers</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER LOAD -->
<div id="header"></div>

<!-- VISION -->
<section id="vision" class="container my-5">
  <h2 class="title">Our <span>Vision</span></h2>
</section>

<!-- ACHIEVEMENTS -->
<section id="achievements" class="container my-5">
  <h2 class="title">Our <span>Achievements</span></h2>

  <div class="achievements-row">

    <div class="count-box">
      <h1 class="counter" data-target="1500">0</h1>
      <p>Students</p>
    </div>

    <div class="count-box">
      <h1 class="counter" data-target="50">0</h1>
      <p>Books</p>
    </div>

    <div class="count-box">
      <h1 class="counter" data-target="350">0</h1>
      <p>Notes</p>
    </div>

  </div>
</section>

<!-- BRANCH -->
<section id="branch" class="container my-5">
  <h2 class="title">Engineering <span>Branch</span></h2>

  <div id="courseSlider" class="carousel slide" data-bs-ride="carousel">

    <div class="carousel-inner text-center">

      <div class="carousel-item active">
        <div class="card p-4 bg-primary text-white">CSE</div>
      </div>

      <div class="carousel-item">
        <div class="card p-4 bg-success text-white">Electrical</div>
      </div>

      <div class="carousel-item">
        <div class="card p-4 bg-danger text-white">Civil</div>
      </div>

    </div>

  </div>
</section>

<!-- TEAM -->
<section id="team" class="container my-5">
  <h2 class="title">Our <span>Team</span></h2>

  <div id="teamCarousel" class="carousel slide" data-bs-ride="carousel">

    <div class="carousel-inner text-center">

      <div class="carousel-item active">
        <div class="team-card">
          <h5>Founder</h5>
        </div>
      </div>

      <div class="carousel-item">
        <div class="team-card">
          <h5>Co-Founder</h5>
        </div>
      </div>

    </div>

  </div>
</section>

<!-- FEEDBACK -->
<section id="feedback" class="container my-5">
  <h2 class="title">Student <span>Feedback</span></h2>

  <div class="feedback-scroll">

    <div class="feedback-card">Good website 👍</div>
    <div class="feedback-card">Best notes 💯</div>
    <div class="feedback-card">Very helpful 👌</div>

  </div>
</section>

<!-- FOOTER LOAD -->
<div id="footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>

</body>
</html>
