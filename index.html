<!DOCTYPE html>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f7fa;
}

/* HEADER */
header{
  background:#1d3557;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:sticky;
  top:0;
  z-index:9999;
}

.logo{font-size:22px;font-weight:900;}
.logo .yellow{color:yellow;}

#menuBtn{font-size:28px;cursor:pointer;}

/* SIDE MENU */
#sideMenu{
  position:fixed;
  top:0;
  right:-270px;
  width:260px;
  height:100%;
  background:#1d3557;
  transition:0.3s;
  padding-top:60px;
  z-index:99999;
}

#sideMenu a{
  display:block;
  padding:15px;
  color:white;
  text-decoration:none;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

#sideMenu.active{right:0;}

#overlay{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.5);
  opacity:0;
  visibility:hidden;
  transition:0.3s;
  z-index:9998;
}

#overlay.active{opacity:1;visibility:visible;}
</style>
</head>

<body>

<!-- HEADER -->
<header>
  <div class="logo">Diploma <span class="yellow">Engineers</span></div>
  <div id="menuBtn"><i class="fa fa-bars"></i></div>
</header>

<!-- MENU -->
<div id="overlay"></div>

<div id="sideMenu">
  <a href="#">Home</a>
  <a href="#">Vision</a>
  <a href="#">Achievements</a>
  <a href="#">Branch</a>
  <a href="#">Team</a>
</div>

<script>
const menuBtn = document.getElementById("menuBtn");
const sideMenu = document.getElementById("sideMenu");
const overlay = document.getElementById("overlay");

menuBtn.onclick = () => {
  sideMenu.classList.add("active");
  overlay.classList.add("active");
};

function closeMenu(){
  sideMenu.classList.remove("active");
  overlay.classList.remove("active");
}

overlay.onclick = closeMenu;
</script>
