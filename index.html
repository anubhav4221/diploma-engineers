<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complete Website</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
}

/* full width sections */
section, div{
    width:100%;
}
</style>
</head>

<body>

<!-- HEADER -->
<div id="header"></div>

<!-- VISION -->
<div id="vision"></div>

<!-- ACHIEVEMENTS -->
<div id="achievements"></div>

<!-- BRANCH -->
<div id="branch"></div>

<!-- STUDENT FEEDBACK -->
<div id="studentfeedback"></div>

<!-- TEAM -->
<div id="team"></div>

<!-- FOOTER -->
<div id="footer"></div>


<script>
// HEADER
fetch("header.html")
.then(res => res.text())
.then(data => document.getElementById("header").innerHTML = data);

// VISION
fetch("vision.html")
.then(res => res.text())
.then(data => document.getElementById("vision").innerHTML = data);

// ACHIEVEMENTS
fetch("achievements.html")
.then(res => res.text())
.then(data => document.getElementById("achievements").innerHTML = data);

// BRANCH
fetch("branch.html")
.then(res => res.text())
.then(data => document.getElementById("branch").innerHTML = data);

// STUDENT FEEDBACK
fetch("studentfeedback.html")
.then(res => res.text())
.then(data => document.getElementById("studentfeedback").innerHTML = data);

// TEAM
fetch("team.html")
.then(res => res.text())
.then(data => document.getElementById("team").innerHTML = data);

// FOOTER
fetch("footer.html")
.then(res => res.text())
.then(data => document.getElementById("footer").innerHTML = data);

</script>

</body>
</html>
