<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Diploma Engineers</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

/* BODY */
body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
}

/* HEADER */
.pro-header{
    background: rgba(29,53,87,0.95);
    padding:15px 0;
    position:sticky;
    top:0;
    z-index:1000;
}

.logo a{
    color:white;
    font-size:24px;
    font-weight:700;
    text-decoration:none;
}
.logo span{
    color:#ffb703;
}

.nav-menu{
    display:flex;
    gap:25px;
}
.nav-menu a{
    color:white;
    text-decoration:none;
    position:relative;
}

.nav-menu a::after{
    content:'';
    position:absolute;
    width:0%;
    height:2px;
    background:#ffb703;
    left:0;
    bottom:0;
    transition:0.3s;
}
.nav-menu a:hover::after,
.nav-menu .active::after{
    width:100%;
}

.menu-toggle{
    display:none;
    color:white;
    font-size:24px;
    cursor:pointer;
}

/* MOBILE MENU */
.overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    top:0;
    left:0;
    opacity:0;
    visibility:hidden;
    transition:0.3s;
}
.overlay.show{
    opacity:1;
    visibility:visible;
}

.side-menu{
    position:fixed;
    top:0;
    right:-100%;
    width:260px;
    height:100%;
    background:#1d3557;
    padding-top:60px;
    transition:0.4s;
}

.side-menu a{
    color:white;
    padding:15px;
    display:block;
    text-decoration:none;
}

.close-btn{
    position:absolute;
    top:15px;
    right:15px;
    color:white;
    cursor:pointer;
}

@media (max-width:768px){
    .nav-menu{
        display:none;
    }
    .menu-toggle{
        display:block;
    }
}

/* HERO */
.hero{
    text-align:center;
    padding:80px 20px;
    background:#fff7f0;
}
.hero h1{
    font-size:40px;
}
.btn-main{
    background:#ff7b00;
    border:none;
    padding:12px 30px;
    border-radius:30px;
    color:white;
}

/* CARDS */
.slider{
    display:flex;
    overflow-x:auto;
    gap:15px;
    padding:15px;
}

.card-custom{
    min-width:250px;
    background:#f8f9fa;
    padding:20px;
    border-radius:10px;
    text-align:center;
    text-decoration:none;
    color:black;
}

</style>
</head>

<body>

<!-- HEADER -->
<header class="pro-header">
  <div class="container d-flex justify-content-between align-items-center">

    <div class="logo">
      <a href="#">Diploma<span>Engineers</span></a>
    </div>

    <nav class="nav-menu">
      <a href="#" class="active">Home</a>
      <a href="#">Notes</a>
      <a href="#">Syllabus</a>
      <a href="#">Result</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </nav>

    <i class="fas fa-bars menu-toggle" onclick="openMenu()"></i>

  </div>
</header>

<!-- MOBILE -->
<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<div class="side-menu" id="sideMenu">
  <i class="fas fa-times close-btn" onclick="closeMenu()"></i>

  <a href="#">Home</a>
  <a href="#">Notes</a>
  <a href="#">Syllabus</a>
  <a href="#">Result</a>
  <a href="#">About</a>
  <a href="#">Contact</a>
</div>

<!-- HERO -->
<section class="hero">
<h1>Welcome Diploma Engineers</h1>
<p>Study Notes | PYQ | Projects</p>

<button class="btn-main mt-3">Explore Now</button>
</section>

<!-- COMMUNITY -->
<section class="text-center p-5 bg-light">
<h2>Join Our Community</h2>

<div class="d-flex justify-content-center gap-4 flex-wrap mt-4">

<div class="p-4 bg-white shadow rounded" style="width:250px;">
<h4>WhatsApp</h4>
<button class="btn btn-success w-100">Join</button>
</div>

<div class="p-4 bg-white shadow rounded" style="width:250px;">
<h4>YouTube</h4>
<button class="btn btn-danger w-100">Join</button>
</div>

<div class="p-4 bg-white shadow rounded" style="width:250px;">
<h4>Telegram</h4>
<button class="btn btn-primary w-100">Join</button>
</div>

</div>
</section>

<!-- BRANCH -->
<section class="container my-5">
<h3 class="text-center mb-4">Branches</h3>

<div class="slider">
<a href="#" class="card-custom">Civil</a>
<a href="#" class="card-custom">Mechanical</a>
<a href="#" class="card-custom">IT</a>
<a href="#" class="card-custom">Electrical</a>
</div>
</section>

<!-- JS -->
<script>
function openMenu(){
    document.getElementById("sideMenu").style.right = "0";
    document.getElementById("overlay").classList.add("show");
}

function closeMenu(){
    document.getElementById("sideMenu").style.right = "-100%";
    document.getElementById("overlay").classList.remove("show");
}
</script>

</body>
</html>
